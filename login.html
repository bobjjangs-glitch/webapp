<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 - TIRETOP</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
  <script src="js/store.js"></script>
  <script src="components/loader.js" defer></script>
  <style>
    .login-page-wrap {
      min-height: calc(100vh - 200px);
      display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
      background: linear-gradient(135deg, #F5F5F5 0%, #EBEBEB 100%);
    }
    .login-page-card {
      width: 100%; max-width: 440px;
      background: #fff; border-radius: var(--radius-xl);
      box-shadow: var(--shadow-lg); overflow: hidden;
    }
    .login-page-head {
      background: linear-gradient(135deg, #111 0%, #333 100%);
      padding: 40px 36px 28px; text-align: center;
    }
    .login-page-logo    { font-size: 28px; font-weight: 900; color: #fff; letter-spacing: 2px; margin-bottom: 4px; }
    .login-page-tagline { font-size: 13px; color: rgba(255,255,255,.6); margin-bottom: 24px; }
    .login-page-tabs    { display: flex; background: rgba(255,255,255,.1); border-radius: 10px; overflow: hidden; }
    .login-page-tab {
      flex: 1; padding: 11px; font-size: 13px; font-weight: 700;
      color: rgba(255,255,255,.6); cursor: pointer; text-align: center;
      transition: all var(--transition);
    }
    .login-page-tab.active { background: var(--primary); color: #fff; border-radius: 10px; }
    .login-page-body { padding: 28px 36px 36px; }
    .redirect-notice {
      display: none; align-items: center; gap: 10px;
      background: #EEF4FF; border: 1.5px solid #99BBFF;
      border-radius: var(--radius-md); padding: 12px 16px;
      margin-bottom: 16px; font-size: 13px; color: #2563eb; font-weight: 600;
    }
    .redirect-notice.show { display: flex; }
    .login-coupon-banner {
      display: flex; align-items: center; gap: 12px;
      background: var(--primary-pale); border: 1.5px solid #FFD0C0;
      border-radius: var(--radius-md); padding: 12px 16px; margin-bottom: 20px;
    }
    .login-error-box {
      display: none; align-items: center; gap: 8px;
      background: #fff5f5; border: 1.5px solid #fecaca;
      border-radius: var(--radius-md); padding: 11px 14px;
      margin-bottom: 14px; font-size: 13px; color: #dc2626; font-weight: 500;
    }
    .login-error-box.show { display: flex; }
    @keyframes shake {
      0%,100%{ transform:translateX(0); }
      20%,60% { transform:translateX(-6px); }
      40%,80% { transform:translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }
    @media (max-width: 480px) {
      .login-page-body { padding: 24px; }
      .login-page-head { padding: 32px 24px 24px; }
    }
  </style>
</head>
<body>
<div id="tt-header"></div>

<div class="login-page-wrap">
  <div class="login-page-card">

    <div class="login-page-head">
      <div class="login-page-logo">TIRETOP</div>
      <p class="login-page-tagline">차량관리의 새로운 기준</p>
      <div class="login-page-tabs">
        <div class="login-page-tab active"
             onclick="switchPageLoginTab(this,'emailLoginForm')">이메일 로그인</div>
        <div class="login-page-tab"
             onclick="switchPageLoginTab(this,'phoneLoginForm')">휴대폰 로그인</div>
      </div>
    </div>

    <div class="login-page-body">

      <!-- redirect 안내 -->
      <div class="redirect-notice" id="redirectNotice">
        🔒 <span id="redirectMsg">로그인 후 이용할 수 있습니다.</span>
      </div>

      <!-- 에러 박스 -->
      <div class="login-error-box" id="loginErrorBox">
        <span>🔒</span>
        <span id="loginErrorMsg">아이디 또는 비밀번호가 올바르지 않습니다.</span>
      </div>

      <!-- 쿠폰 배너 -->
      <div class="login-coupon-banner">
        <div style="font-size:24px;flex-shrink:0">🎁</div>
        <div>
          <div style="font-size:13px;font-weight:800;color:var(--primary);margin-bottom:2px">
            신규가입 시 쿠폰팩 27,000원 지급!
          </div>
          <div style="font-size:11px;color:var(--gray3)">지금 가입하고 첫 주문에 바로 사용하세요</div>
        </div>
      </div>

      <!-- 이메일 폼 -->
      <div id="emailLoginForm">
        <button class="social-btn social-kakao"
                onclick="pageSocialLogin('카카오','kakao_' + Date.now())">
          💬 카카오로 시작하기
        </button>
        <button class="social-btn social-naver"
                onclick="pageSocialLogin('네이버','naver_' + Date.now())">
          N 네이버로 시작하기
        </button>
        <button class="social-btn social-apple"
                onclick="pageSocialLogin('Apple','apple_' + Date.now())">
          🍎 Apple로 시작하기
        </button>

        <div class="divider">또는 이메일로 로그인</div>

        <div class="form-group">
          <label class="form-label">이메일</label>
          <input class="form-input" type="email" id="pageLoginEmail"
                 placeholder="이메일 주소 입력"
                 onkeydown="if(event.key==='Enter')pageDoLogin()">
        </div>
        <div class="form-group">
          <label class="form-label">비밀번호</label>
          <div class="form-input-wrap">
            <input class="form-input" type="password" id="pageLoginPw"
                   placeholder="비밀번호 입력" style="padding-right:44px"
                   onkeydown="if(event.key==='Enter')pageDoLogin()">
            <span class="form-input-icon"
                  onclick="togglePw('pageLoginPw',this)">👁️</span>
          </div>
        </div>

        <div class="form-options">
          <label class="form-check">
            <input type="checkbox" id="keepLogin">
            <span>로그인 상태 유지</span>
          </label>
          <a href="#" class="forgot-link"
             onclick="toggleFindArea();return false">아이디·비밀번호 찾기</a>
        </div>

        <button class="btn-login-submit" id="loginSubmitBtn"
                onclick="pageDoLogin()">로그인</button>

        <p class="login-footer-text">
          아직 회원이 아니신가요? <a href="signup.html">회원가입 →</a>
        </p>
      </div>

      <!-- 휴대폰 폼 -->
      <div id="phoneLoginForm" style="display:none">
        <div class="form-group">
          <label class="form-label">휴대폰 번호</label>
          <div class="phone-input-group">
            <input class="form-input" type="tel" id="pageLoginPhone"
                   placeholder="010-0000-0000" style="flex:1">
            <button class="btn-verify"
                    onclick="sendSms('phoneLoginCode')">인증번호 발송</button>
          </div>
        </div>
        <div class="form-group verify-code-wrap" id="phoneLoginCode">
          <label class="form-label">인증번호</label>
          <div class="form-input-wrap">
            <input class="form-input" type="text"
                   placeholder="6자리 입력" style="padding-right:60px">
            <span class="verify-timer" id="phoneLoginCodeTimer">3:00</span>
          </div>
        </div>
        <button class="btn-login-submit" onclick="pageDoPhoneLogin()">
          휴대폰으로 로그인
        </button>
        <p class="login-footer-text">
          아직 회원이 아니신가요? <a href="signup.html">회원가입 →</a>
        </p>
      </div>

      <!-- 아이디·비밀번호 찾기 -->
      <div id="findArea" style="display:none;margin-top:16px;
           padding-top:16px;border-top:1px solid var(--gray5)">
        <div class="find-tabs" style="margin-bottom:16px">
          <div class="find-tab active"
               onclick="switchFindTab(this,'pageFind-id')">아이디 찾기</div>
          <div class="find-tab"
               onclick="switchFindTab(this,'pageFind-pw')">비밀번호 찾기</div>
        </div>

        <div id="pageFind-id">
          <div class="form-group">
            <label class="form-label">이름</label>
            <input class="form-input" type="text"
                   id="findIdName" placeholder="가입 시 등록한 이름">
          </div>
          <div class="form-group">
            <label class="form-label">휴대폰 번호</label>
            <div class="phone-input-group">
              <input class="form-input" type="tel"
                     id="findIdPhone" placeholder="010-0000-0000" style="flex:1">
              <button class="btn-verify"
                      onclick="sendSms('findIdCode2')">인증번호 발송</button>
            </div>
          </div>
          <div class="form-group verify-code-wrap" id="findIdCode2">
            <div class="form-input-wrap">
              <input class="form-input" type="text"
                     placeholder="6자리" style="padding-right:60px">
              <span class="verify-timer" id="findIdCode2Timer">3:00</span>
            </div>
          </div>
          <button class="btn-login-submit" onclick="findId()">아이디 찾기</button>
        </div>

        <div id="pageFind-pw" style="display:none">
          <div class="form-group">
            <label class="form-label">이메일</label>
            <input class="form-input" type="email"
                   id="findPwEmail" placeholder="가입한 이메일 주소">
          </div>
          <div class="form-group">
            <label class="form-label">휴대폰 번호</label>
            <div class="phone-input-group">
              <input class="form-input" type="tel"
                     placeholder="010-0000-0000" style="flex:1">
              <button class="btn-verify"
                      onclick="sendSms('findPwCode2')">인증번호 발송</button>
            </div>
          </div>
          <div class="form-group verify-code-wrap" id="findPwCode2">
            <div class="form-input-wrap">
              <input class="form-input" type="text"
                     placeholder="6자리" style="padding-right:60px">
              <span class="verify-timer" id="findPwCode2Timer">3:00</span>
            </div>
          </div>
          <button class="btn-login-submit" onclick="sendResetLink()">
            비밀번호 재설정
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<div id="tt-footer"></div>

<script>
/* ────────────────────────────────────────────
   TIRETOP login.html - Hono D1 API 연동 v4.0
──────────────────────────────────────────── */
const redirectUrl = new URLSearchParams(location.search).get('redirect') || '';

document.addEventListener('DOMContentLoaded', () => {
  if (TTStore.Auth.isLoggedIn()) {
    setTimeout(() => location.href = getRedirectTarget(), 800);
    return;
  }
  if (redirectUrl) {
    const notice = document.getElementById('redirectNotice');
    const msg    = document.getElementById('redirectMsg');
    if (notice) notice.classList.add('show');
    if (msg) {
      const pageNames = {'cart.html':'장바구니','mypage.html':'마이페이지','checkout.html':'주문/결제'};
      const page = decodeURIComponent(redirectUrl).split('/').pop().split('?')[0];
      msg.textContent = (pageNames[page]||'해당 페이지')+'는 로그인 후 이용할 수 있습니다.';
    }
  }
});

function switchPageLoginTab(el, formId) {
  document.querySelectorAll('.login-page-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('emailLoginForm').style.display = formId==='emailLoginForm'?'block':'none';
  document.getElementById('phoneLoginForm').style.display = formId==='phoneLoginForm'?'block':'none';
  hideError();
}

function toggleFindArea() {
  const fa = document.getElementById('findArea');
  if (fa) fa.style.display = fa.style.display==='none' ? 'block' : 'none';
}

function showError(msg) {
  const box = document.getElementById('loginErrorBox');
  const txt = document.getElementById('loginErrorMsg');
  if (txt) txt.textContent = msg;
  if (box) { box.classList.add('show'); box.classList.remove('shake'); void box.offsetWidth; box.classList.add('shake'); }
}
function hideError() { document.getElementById('loginErrorBox')?.classList.remove('show'); }

function setLoginLoading(on) {
  const btn = document.getElementById('loginSubmitBtn');
  if (!btn) return;
  btn.disabled = on;
  btn.textContent = on ? '로그인 중...' : '로그인';
}

function getRedirectTarget() {
  return redirectUrl ? decodeURIComponent(redirectUrl) : 'index.html';
}

/* ── 이메일 로그인 → /api/auth/login ── */
async function pageDoLogin() {
  hideError();
  const email = document.getElementById('pageLoginEmail')?.value.trim() || '';
  const pw    = document.getElementById('pageLoginPw')?.value || '';
  if (!email) { showError('이메일을 입력해 주세요.'); return; }
  if (!pw)    { showError('비밀번호를 입력해 주세요.'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('올바른 이메일 형식이 아닙니다.'); return; }
  setLoginLoading(true);
  try {
    const res = await TTStore.login(email, pw);
    setLoginLoading(false);
    if (!res?.success) {
      showError(res?.message || '이메일 또는 비밀번호가 올바르지 않습니다.');
      document.getElementById('pageLoginPw').value = '';
      return;
    }
    const userName = res.data?.user?.name || '회원';
    if (typeof showToast === 'function') showToast('로그인 완료', userName+'님, 환영합니다! 🎉', 'success');
    else alert(userName+'님, 환영합니다!');
    setTimeout(() => location.href = getRedirectTarget(), 900);
  } catch(e) {
    setLoginLoading(false);
    showError('서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.');
  }
}

function pageDoPhoneLogin() { showError('휴대폰 로그인은 준비 중입니다. 이메일 로그인을 이용해 주세요.'); }
function pageSocialLogin(provider) { showError(provider+' 소셜 로그인은 준비 중입니다. 이메일 로그인을 이용해 주세요.'); }
function findId() { if (typeof showToast==='function') showToast('안내', '이메일 찾기는 고객센터로 문의해 주세요.', 'info'); }
function sendResetLink() {
  const email = document.getElementById('findPwEmail')?.value.trim();
  if (!email) { if(typeof showToast==='function') showToast('입력 오류','이메일을 입력해 주세요.','error'); return; }
  if(typeof showToast==='function') showToast('안내','비밀번호 재설정은 고객센터로 문의해 주세요.','info');
}
function switchFindTab(el, targetId) {
  document.querySelectorAll('.find-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['pageFind-id','pageFind-pw'].forEach(id => {
    const e = document.getElementById(id);
    if (e) e.style.display = id===targetId ? 'block' : 'none';
  });
}
function togglePw(inputId, btn) {
  const inp = document.getElementById(inputId);
  if (!inp) return;
  inp.type = inp.type==='password' ? 'text' : 'password';
  btn.textContent = inp.type==='password' ? '👁️' : '🔒';
}
function sendSms(targetId) { if(typeof showToast==='function') showToast('안내','SMS 인증은 준비 중입니다.','info'); }
</script>
</body>
</html>
