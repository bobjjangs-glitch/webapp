<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그아웃 - TIRETOP</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
  <script src="components/loader.js" defer></script>
  <style>
    .logout-wrap { max-width: 480px; margin: 60px auto 80px; padding: 0 24px; text-align: center; }
    .logout-card { background: #fff; border-radius: var(--radius-xl); box-shadow: var(--shadow-md); padding: 44px 36px; }
    .logout-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--gray5); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; font-size: 36px; }
    .logout-name { font-size: 22px; font-weight: 900; margin-bottom: 4px; }
    .logout-email { font-size: 14px; color: var(--gray3); margin-bottom: 24px; }
    .logout-info { display: flex; justify-content: center; gap: 24px; margin-bottom: 28px; }
    .logout-info-item { text-align: center; }
    .logout-info-item .val { font-size: 18px; font-weight: 900; color: var(--primary); }
    .logout-info-item .key { font-size: 11px; color: var(--gray3); margin-top: 2px; }
    .logout-notice { background: var(--gray6); border-radius: var(--radius-lg); padding: 16px 20px; text-align: left; margin-bottom: 24px; }
    .logout-notice p { font-size: 13px; color: var(--gray2); line-height: 1.7; }
    .logout-notice p::before { content: '• '; color: var(--primary); }
    /* 로그아웃 애니메이션 */
    .logout-progress { display: none; }
    .logout-progress.show { display: block; }
    .progress-bar-wrap { height: 6px; background: var(--gray5); border-radius: 3px; overflow: hidden; margin: 16px 0; }
    .progress-bar-fill { height: 100%; background: var(--primary); border-radius: 3px; width: 0; transition: width 1.5s ease; }
    /* 완료 뷰 */
    .logout-done { display: none; }
    .logout-done.show { display: block; }
    @media (max-width: 480px) { .logout-card { padding: 32px 24px; } }
  </style>
</head>
<body>
<div id="tt-header"></div>

<div class="logout-wrap">
  <!-- 로그아웃 확인 -->
  <div id="logoutConfirm">
    <div class="logout-card">
      <div class="logout-avatar">😊</div>
      <div class="logout-name" id="loName">고객님</div>
      <div class="logout-email" id="loEmail">user@example.com</div>
      <div class="logout-info">
        <div class="logout-info-item">
          <div class="val">GOLD</div>
          <div class="key">등급</div>
        </div>
        <div class="logout-info-item">
          <div class="val" id="loLastLogin">방금 전</div>
          <div class="key">마지막 로그인</div>
        </div>
        <div class="logout-info-item">
          <div class="val">2,500</div>
          <div class="key">보유 포인트</div>
        </div>
      </div>
      <div class="logout-notice">
        <p>로그아웃하면 자동 로그인이 해제됩니다.</p>
        <p>장바구니 상품은 유지됩니다.</p>
        <p>진행 중인 주문에는 영향을 주지 않습니다.</p>
      </div>
      <button class="btn btn-primary btn-block" style="height:54px;font-size:17px;margin-bottom:12px"
              onclick="startLogout()">로그아웃</button>
      <button class="btn btn-block" style="height:48px;background:var(--gray6);font-size:15px"
              onclick="location.href='mypage.html'">취소 · 마이페이지로</button>
    </div>
  </div>

  <!-- 로그아웃 진행 -->
  <div id="logoutProgress" class="logout-progress">
    <div class="logout-card">
      <div style="font-size:56px;margin-bottom:16px">👋</div>
      <div style="font-size:20px;font-weight:900;margin-bottom:8px">로그아웃 중...</div>
      <div style="font-size:14px;color:var(--gray3);margin-bottom:4px">안전하게 로그아웃 처리 중입니다.</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="logoutBar"></div>
      </div>
    </div>
  </div>

  <!-- 로그아웃 완료 -->
  <div id="logoutDone" class="logout-done">
    <div class="logout-card">
      <div style="font-size:64px;margin-bottom:16px">✅</div>
      <div style="font-size:24px;font-weight:900;margin-bottom:8px">로그아웃 완료</div>
      <div style="font-size:14px;color:var(--gray2);margin-bottom:28px;line-height:1.7">
        안전하게 로그아웃되었습니다.<br>
        다음에 또 만나요! 😊
      </div>
      <div style="background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:var(--radius-lg);padding:20px;color:#fff;margin-bottom:24px">
        <div style="font-size:13px;opacity:.8;margin-bottom:4px">🎁 다음 방문을 위한 혜택</div>
        <div style="font-size:16px;font-weight:900">재가입 시 쿠폰팩 27,000원 지급!</div>
      </div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary" style="flex:1;height:52px"
                onclick="location.href='login.html'">다시 로그인</button>
        <button class="btn" style="flex:1;height:52px;background:var(--gray6)"
                onclick="location.href='index.html'">홈으로</button>
      </div>
    </div>
  </div>
</div>

<div id="tt-footer"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const user = JSON.parse(localStorage.getItem('ttUser') || '{}');
  const nameEl  = document.getElementById('loName');
  const emailEl = document.getElementById('loEmail');
  const lastEl  = document.getElementById('loLastLogin');
  if (nameEl)  nameEl.textContent  = (user.name  || '고객') + '님';
  if (emailEl) emailEl.textContent = user.email   || '';
  if (lastEl && user.loginAt) {
    const diff = Math.floor((Date.now() - new Date(user.loginAt)) / 60000);
    lastEl.textContent = diff < 1 ? '방금 전' : diff < 60 ? diff + '분 전' : Math.floor(diff/60) + '시간 전';
  }
  /* 비로그인 상태면 바로 홈 */
  if (localStorage.getItem('isLoggedIn') !== 'true') {
    showToast('알림', '로그인 상태가 아닙니다.', 'info');
    setTimeout(() => location.href = 'index.html', 1000);
  }
});

function startLogout() {
  document.getElementById('logoutConfirm').style.display  = 'none';
  document.getElementById('logoutProgress').classList.add('show');
  /* 프로그레스 바 */
  const bar = document.getElementById('logoutBar');
  requestAnimationFrame(() => { if (bar) bar.style.width = '100%'; });
  setTimeout(() => {
    /* 실제 로그아웃 처리 */
    localStorage.removeItem('isLoggedIn');
    localStorage.removeItem('ttUser');
    document.getElementById('logoutProgress').classList.remove('show');
    document.getElementById('logoutDone').classList.add('show');
  }, 1800);
}
</script>
</body>
</html>
