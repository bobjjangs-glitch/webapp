<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 - TIRETOP</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/common.css">
  <script src="js/store.js"></script>
  <script src="components/loader.js" defer></script>
  <style>
    :root {
      --primary:#e02020; --primary-dark:#c01010; --primary-light:#fff0f0;
      --gray1:#f8f9fa; --gray2:#e9ecef; --gray3:#adb5bd;
      --gray4:#6c757d; --gray5:#343a40;
      --text:#1a1a1a; --white:#ffffff;
      --shadow:0 2px 12px rgba(0,0,0,.08);
      --shadow-lg:0 8px 32px rgba(0,0,0,.14);
      --radius-sm:6px; --radius-md:10px; --radius-lg:16px;
    }

    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Noto Sans KR',sans-serif; color:var(--text); background:#f4f6f9; }

    /* ── 브레드크럼 ── */
    .breadcrumb {
      max-width:1200px; margin:0 auto; padding:14px 20px;
      font-size:13px; color:var(--gray4);
    }
    .breadcrumb a { color:var(--gray4); text-decoration:none; }
    .breadcrumb a:hover { color:var(--primary); }
    .breadcrumb span { margin:0 6px; }

    /* ── 레이아웃 ── */
    .mypage-wrap {
      max-width:1200px; margin:0 auto; padding:0 20px 60px;
      display:grid; grid-template-columns:240px 1fr; gap:24px;
    }

    /* ── 사이드바 ── */
    .mypage-sidebar { display:flex; flex-direction:column; gap:16px; }

    .sidebar-profile {
      background:#fff; border-radius:var(--radius-lg);
      padding:24px 20px; box-shadow:var(--shadow);
      text-align:center;
    }
    .sidebar-avatar {
      width:72px; height:72px; border-radius:50%;
      background:linear-gradient(135deg,var(--primary),#ff6b6b);
      color:#fff; font-size:28px; font-weight:900;
      display:flex; align-items:center; justify-content:center;
      margin:0 auto 12px;
    }
    .sidebar-name { font-size:17px; font-weight:700; margin-bottom:4px; }
    .sidebar-email { font-size:12px; color:var(--gray4); margin-bottom:14px; }
    .sidebar-grade {
      display:inline-flex; align-items:center; gap:6px;
      padding:5px 14px; border-radius:16px;
      background:var(--primary-light); color:var(--primary);
      font-size:12px; font-weight:700;
    }
    .sidebar-points {
      margin-top:14px; padding:12px;
      background:var(--gray1); border-radius:var(--radius-md);
      font-size:13px;
    }
    .sidebar-points .point-val {
      font-size:20px; font-weight:900; color:var(--primary);
      display:block; margin-top:4px;
    }

    .sidebar-nav {
      background:#fff; border-radius:var(--radius-lg);
      padding:8px 0; box-shadow:var(--shadow);
    }
    .sidebar-nav-section {
      padding:10px 20px 4px;
      font-size:11px; font-weight:700; color:var(--gray3);
      letter-spacing:.5px; text-transform:uppercase;
    }
    .sidebar-nav-item {
      display:flex; align-items:center; gap:10px;
      padding:11px 20px; font-size:14px; font-weight:500;
      color:var(--gray5); cursor:pointer;
      border:none; background:none; width:100%;
      text-align:left; font-family:inherit;
      transition:background .15s, color .15s;
      border-left:3px solid transparent;
    }
    .sidebar-nav-item:hover { background:var(--gray1); color:var(--primary); }
    .sidebar-nav-item.active {
      background:var(--primary-light); color:var(--primary);
      font-weight:700; border-left-color:var(--primary);
    }
    .sidebar-nav-badge {
      margin-left:auto; min-width:18px; height:18px; border-radius:9px;
      background:var(--primary); color:#fff; font-size:10px;
      font-weight:700; display:flex; align-items:center;
      justify-content:center; padding:0 5px;
    }

    /* ── 메인 콘텐츠 ── */
    .mypage-content { display:flex; flex-direction:column; gap:20px; }

    .mypage-section {
      background:#fff; border-radius:var(--radius-lg);
      padding:28px; box-shadow:var(--shadow);
      display:none;
    }
    .mypage-section.active { display:block; }

    .section-header {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:20px; padding-bottom:16px;
      border-bottom:2px solid var(--gray2);
    }
    .section-title {
      font-size:18px; font-weight:700; display:flex;
      align-items:center; gap:8px;
    }
    .section-action-btn {
      padding:8px 16px; border-radius:var(--radius-sm);
      border:1.5px solid var(--primary); background:#fff;
      color:var(--primary); font-size:13px; font-weight:600;
      cursor:pointer; font-family:inherit; transition:all .2s;
    }
    .section-action-btn:hover { background:var(--primary); color:#fff; }
    .section-action-btn.primary {
      background:var(--primary); color:#fff;
    }
    .section-action-btn.primary:hover { background:var(--primary-dark); }

    /* ── 프로필 ── */
    .profile-grid {
      display:grid; grid-template-columns:1fr 1fr; gap:16px;
    }
    .profile-field { display:flex; flex-direction:column; gap:6px; }
    .profile-field label {
      font-size:12px; font-weight:700; color:var(--gray4);
      text-transform:uppercase; letter-spacing:.3px;
    }
    .profile-field input, .profile-field select {
      padding:11px 14px; border:1.5px solid var(--gray2);
      border-radius:var(--radius-md); font-size:14px;
      font-family:inherit; outline:none; transition:border-color .2s;
    }
    .profile-field input:focus, .profile-field select:focus {
      border-color:var(--primary);
    }
    .profile-field input:read-only {
      background:var(--gray1); color:var(--gray4); cursor:not-allowed;
    }
    .profile-field.full { grid-column:1/-1; }

    /* ── 주문 ── */
    .order-filter-bar {
      display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;
    }
    .order-filter-btn {
      padding:7px 16px; border-radius:20px; font-size:13px;
      font-weight:600; border:1.5px solid var(--gray2);
      background:#fff; cursor:pointer; font-family:inherit;
      transition:all .2s; color:var(--gray4);
    }
    .order-filter-btn.active {
      border-color:var(--primary); background:var(--primary);
      color:#fff;
    }

    .order-card {
      border:1.5px solid var(--gray2); border-radius:var(--radius-lg);
      overflow:hidden; margin-bottom:16px; transition:box-shadow .2s;
    }
    .order-card:hover { box-shadow:var(--shadow); }
    .order-card-head {
      padding:14px 20px;
      background:var(--gray1); border-bottom:1px solid var(--gray2);
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:8px;
    }
    .order-card-id { font-size:13px; font-weight:700; color:var(--gray5); }
    .order-card-date { font-size:12px; color:var(--gray4); }
    .order-status-badge {
      padding:4px 12px; border-radius:12px;
      font-size:12px; font-weight:700;
    }
    .status-paid      { background:#dcfce7; color:#16a34a; }
    .status-shipping  { background:#dbeafe; color:#2563eb; }
    .status-delivered { background:#f3f4f6; color:#374151; }
    .status-cancelled { background:#fee2e2; color:#dc2626; }
    .status-pending   { background:#fef3c7; color:#d97706; }

    .order-card-body { padding:20px; }
    .order-item-row {
      display:flex; align-items:center; gap:14px;
      padding:10px 0; border-bottom:1px solid var(--gray2);
    }
    .order-item-row:last-child { border-bottom:none; }
    .order-item-thumb {
      width:56px; height:56px; border-radius:var(--radius-md);
      background:var(--gray1); display:flex; align-items:center;
      justify-content:center; font-size:24px; flex-shrink:0;
      border:1px solid var(--gray2);
    }
    .order-item-info { flex:1; min-width:0; }
    .order-item-name {
      font-size:14px; font-weight:600; margin-bottom:3px;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .order-item-meta { font-size:12px; color:var(--gray4); }
    .order-item-price { font-size:14px; font-weight:700; color:var(--primary); flex-shrink:0; }

    .order-card-foot {
      padding:14px 20px; border-top:1px solid var(--gray2);
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:8px;
    }
    .order-total { font-size:15px; font-weight:700; }
    .order-total strong { color:var(--primary); }
    .order-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .order-action-btn {
      padding:7px 14px; border-radius:var(--radius-sm);
      font-size:12px; font-weight:600; cursor:pointer;
      font-family:inherit; transition:all .2s;
    }
    .order-action-btn.outline {
      border:1.5px solid var(--gray2); background:#fff; color:var(--gray5);
    }
    .order-action-btn.outline:hover { border-color:var(--primary); color:var(--primary); }
    .order-action-btn.red-outline {
      border:1.5px solid #fecaca; background:#fff0f0; color:var(--primary);
    }

    /* ── 예약 ── */
    .reservation-card {
      border:1.5px solid var(--gray2); border-radius:var(--radius-lg);
      padding:20px; margin-bottom:14px;
      display:grid; grid-template-columns:1fr auto; gap:16px;
      align-items:center; transition:box-shadow .2s;
    }
    .reservation-card:hover { box-shadow:var(--shadow); }
    .reservation-info-grid {
      display:grid; grid-template-columns:repeat(3,1fr); gap:12px;
    }
    .res-info-item label {
      font-size:11px; font-weight:700; color:var(--gray3);
      text-transform:uppercase; display:block; margin-bottom:3px;
    }
    .res-info-item span { font-size:14px; font-weight:600; color:var(--text); }

    /* ── 쿠폰 ── */
    .coupon-stats {
      display:grid; grid-template-columns:repeat(3,1fr); gap:14px;
      margin-bottom:20px;
    }
    .coupon-stat-card {
      background:var(--gray1); border-radius:var(--radius-md);
      padding:16px; text-align:center;
    }
    .coupon-stat-card .stat-val {
      font-size:24px; font-weight:900; color:var(--primary);
      display:block; margin-bottom:4px;
    }
    .coupon-stat-card .stat-label { font-size:12px; color:var(--gray4); }

    .coupon-code-input {
      display:flex; gap:10px; margin-bottom:20px;
    }
    .coupon-code-input input {
      flex:1; padding:11px 16px; border:1.5px solid var(--gray2);
      border-radius:var(--radius-md); font-size:14px;
      font-family:inherit; outline:none; transition:border-color .2s;
    }
    .coupon-code-input input:focus { border-color:var(--primary); }

    .coupon-card {
      border:2px dashed var(--gray2); border-radius:var(--radius-lg);
      padding:20px; margin-bottom:12px;
      display:flex; align-items:center; gap:16px;
      transition:border-color .2s, background .2s;
    }
    .coupon-card:hover { border-color:var(--primary); background:var(--primary-light); }
    .coupon-icon {
      width:52px; height:52px; border-radius:50%;
      background:linear-gradient(135deg,var(--primary),#ff6b6b);
      color:#fff; font-size:22px;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .coupon-info { flex:1; min-width:0; }
    .coupon-name { font-size:15px; font-weight:700; margin-bottom:3px; }
    .coupon-desc { font-size:12px; color:var(--gray4); margin-bottom:4px; }
    .coupon-expire { font-size:11px; color:var(--gray3); }
    .coupon-value {
      font-size:22px; font-weight:900; color:var(--primary);
      flex-shrink:0; text-align:right;
    }

    /* ── 포인트 ── */
    .point-summary {
      display:grid; grid-template-columns:repeat(3,1fr); gap:14px;
      margin-bottom:24px;
    }
    .point-summary-card {
      border-radius:var(--radius-lg); padding:20px; text-align:center;
    }
    .point-summary-card.total-card {
      background:linear-gradient(135deg,var(--primary),#ff6b6b); color:#fff;
    }
    .point-summary-card.earn-card { background:#dcfce7; }
    .point-summary-card.use-card  { background:#fee2e2; }
    .point-summary-card .ps-val {
      font-size:26px; font-weight:900; display:block; margin-bottom:4px;
    }
    .point-summary-card.total-card .ps-val { color:#fff; }
    .point-summary-card.earn-card  .ps-val { color:#16a34a; }
    .point-summary-card.use-card   .ps-val { color:#dc2626; }
    .point-summary-card .ps-label { font-size:12px; opacity:.8; }

    .point-history-table { width:100%; border-collapse:collapse; }
    .point-history-table th {
      padding:10px 14px; background:var(--gray1);
      font-size:12px; font-weight:700; color:var(--gray4);
      text-align:left; border-bottom:2px solid var(--gray2);
    }
    .point-history-table td {
      padding:12px 14px; font-size:13px;
      border-bottom:1px solid var(--gray2);
    }
    .point-earn { color:#16a34a; font-weight:700; }
    .point-use  { color:#dc2626; font-weight:700; }

    /* ── 차량 ── */
    .cars-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
      gap:14px;
    }
    .car-card {
      border:1.5px solid var(--gray2); border-radius:var(--radius-lg);
      padding:20px; text-align:center; position:relative;
      transition:box-shadow .2s, border-color .2s;
    }
    .car-card:hover { box-shadow:var(--shadow); border-color:var(--primary); }
    .car-card.main-car { border-color:var(--primary); background:var(--primary-light); }
    .car-main-badge {
      position:absolute; top:10px; right:10px;
      padding:3px 8px; border-radius:10px;
      background:var(--primary); color:#fff; font-size:10px; font-weight:700;
    }
    .car-icon { font-size:42px; margin-bottom:10px; }
    .car-model { font-size:15px; font-weight:700; margin-bottom:4px; }
    .car-meta { font-size:12px; color:var(--gray4); margin-bottom:14px; }
    .car-actions { display:flex; gap:8px; justify-content:center; }
    .car-btn {
      padding:7px 14px; border-radius:var(--radius-sm); font-size:12px;
      font-weight:600; cursor:pointer; font-family:inherit; transition:all .2s;
    }
    .car-btn-edit {
      border:1.5px solid var(--gray2); background:#fff; color:var(--gray5);
    }
    .car-btn-edit:hover { border-color:var(--primary); color:var(--primary); }
    .car-btn-del {
      border:1.5px solid #fecaca; background:#fff0f0; color:var(--primary);
    }

    /* ── 위시리스트 ── */
    .wish-grid {
      display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
      gap:16px;
    }
    .wish-item {
      border:1.5px solid var(--gray2); border-radius:var(--radius-lg);
      overflow:hidden; transition:box-shadow .2s;
    }
    .wish-item:hover { box-shadow:var(--shadow); }
    .wish-thumb {
      height:140px; background:var(--gray1);
      display:flex; align-items:center; justify-content:center;
      font-size:48px; position:relative;
    }
    .wish-remove-btn {
      position:absolute; top:8px; right:8px;
      width:28px; height:28px; border-radius:50%;
      background:rgba(0,0,0,.4); color:#fff;
      border:none; cursor:pointer; font-size:13px;
      display:flex; align-items:center; justify-content:center;
      transition:background .2s;
    }
    .wish-remove-btn:hover { background:var(--primary); }
    .wish-info { padding:12px; }
    .wish-name {
      font-size:13px; font-weight:600; margin-bottom:4px;
      overflow:hidden; text-overflow:ellipsis;
      display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
    }
    .wish-price { font-size:14px; font-weight:900; color:var(--primary); }
    .wish-cart-btn {
      width:100%; padding:9px; background:var(--primary);
      color:#fff; border:none; font-size:12px; font-weight:700;
      cursor:pointer; font-family:inherit; transition:background .2s;
    }
    .wish-cart-btn:hover { background:var(--primary-dark); }

    /* ── 리뷰 ── */
    .review-card {
      border:1.5px solid var(--gray2); border-radius:var(--radius-lg);
      padding:20px; margin-bottom:14px;
    }
    .review-product { font-size:13px; color:var(--gray4); margin-bottom:8px; }
    .review-stars { color:#f59e0b; font-size:16px; margin-bottom:8px; }
    .review-body { font-size:14px; line-height:1.7; color:var(--text); }
    .review-date { font-size:11px; color:var(--gray3); margin-top:8px; }
    .review-admin-reply {
      margin-top:12px; padding:12px 16px;
      background:var(--gray1); border-radius:var(--radius-md);
      border-left:3px solid var(--primary); font-size:13px;
    }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align:center; padding:48px 20px; color:var(--gray4);
    }
    .empty-state .empty-icon { font-size:48px; margin-bottom:14px; }
    .empty-state .empty-title { font-size:16px; font-weight:700; margin-bottom:6px; color:var(--gray5); }
    .empty-state .empty-desc  { font-size:13px; margin-bottom:20px; }
    .empty-cta-btn {
      display:inline-block; padding:11px 28px;
      background:var(--primary); color:#fff; border-radius:var(--radius-md);
      font-size:14px; font-weight:700; text-decoration:none;
      transition:background .2s;
    }
    .empty-cta-btn:hover { background:var(--primary-dark); }

    /* ── 모달 ── */
    .modal-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
      z-index:3000; align-items:center; justify-content:center; padding:20px;
    }
    .modal-overlay.open { display:flex; }
    .modal-box {
      background:#fff; border-radius:var(--radius-lg);
      width:100%; max-width:480px; max-height:90vh;
      overflow-y:auto; box-shadow:var(--shadow-lg);
      animation:modalIn .2s ease;
    }
    @keyframes modalIn {
      from { opacity:0; transform:scale(.95) translateY(-10px); }
      to   { opacity:1; transform:scale(1) translateY(0); }
    }
    .modal-head {
      padding:20px 24px; border-bottom:1px solid var(--gray2);
      display:flex; align-items:center; justify-content:space-between;
    }
    .modal-title { font-size:17px; font-weight:700; }
    .modal-close {
      width:32px; height:32px; border-radius:50%;
      border:none; background:var(--gray2); cursor:pointer;
      font-size:16px; display:flex; align-items:center; justify-content:center;
    }
    .modal-body { padding:24px; }
    .modal-foot {
      padding:16px 24px; border-top:1px solid var(--gray2);
      display:flex; gap:10px; justify-content:flex-end;
    }
    .modal-btn {
      padding:10px 24px; border-radius:var(--radius-md); font-size:14px;
      font-weight:700; cursor:pointer; font-family:inherit; transition:all .2s;
    }
    .modal-btn.cancel {
      border:1.5px solid var(--gray2); background:#fff; color:var(--gray5);
    }
    .modal-btn.cancel:hover { background:var(--gray1); }
    .modal-btn.confirm {
      background:var(--primary); color:#fff; border:1.5px solid var(--primary);
    }
    .modal-btn.confirm:hover { background:var(--primary-dark); }

    .form-field { margin-bottom:14px; }
    .form-field label {
      display:block; font-size:12px; font-weight:700;
      color:var(--gray4); margin-bottom:6px;
      text-transform:uppercase; letter-spacing:.3px;
    }
    .form-field input, .form-field select, .form-field textarea {
      width:100%; padding:11px 14px; border:1.5px solid var(--gray2);
      border-radius:var(--radius-md); font-size:14px;
      font-family:inherit; outline:none; transition:border-color .2s;
    }
    .form-field input:focus, .form-field select:focus,
    .form-field textarea:focus { border-color:var(--primary); }
    .form-field textarea { resize:vertical; min-height:90px; }

    /* ── 모바일 탭바 ── */
    .mobile-tab-bar {
      display:none; position:fixed; bottom:0; left:0; right:0;
      background:#fff; border-top:1px solid var(--gray2);
      z-index:900; padding:4px 0 8px;
      grid-template-columns:repeat(5,1fr);
    }
    .mobile-tab-item {
      display:flex; flex-direction:column; align-items:center; gap:2px;
      padding:6px 4px; background:none; border:none; cursor:pointer;
      font-size:10px; color:var(--gray4); font-family:inherit;
      transition:color .15s;
    }
    .mobile-tab-item.active { color:var(--primary); }
    .mobile-tab-item span:first-child { font-size:20px; }

    /* ── 반응형 ── */
    @media (max-width:900px) {
      .mypage-wrap { grid-template-columns:1fr; }
      .mypage-sidebar { display:none; }
      .mobile-tab-bar { display:grid; }
      body { padding-bottom:70px; }
      .profile-grid { grid-template-columns:1fr; }
      .reservation-info-grid { grid-template-columns:1fr 1fr; }
    }
    @media (max-width:600px) {
      .coupon-stats, .point-summary { grid-template-columns:1fr 1fr; }
      .wish-grid { grid-template-columns:repeat(2,1fr); }
      .order-card-head { flex-direction:column; align-items:flex-start; }
    }
  </style>
</head>
<body>

<div id="tt-header"></div>

<!-- 브레드크럼 -->
<div class="breadcrumb">
  <a href="index.html">홈</a>
  <span>›</span>
  <strong>마이페이지</strong>

<script>
/* =====================================================
   mypage.html – JavaScript  (API 연동 버전)
===================================================== */

/* ── API 헬퍼 ── */
const API_BASE = '/api';
function getToken() {
  return localStorage.getItem('tt_token') || sessionStorage.getItem('tt_token');
}
async function apiGet(path) {
  const token = getToken();
  const res = await fetch(API_BASE + path, {
    headers: token ? { 'Authorization': 'Bearer ' + token } : {}
  });
  if (res.status === 401) { location.href = 'login.html?redirect=mypage.html'; return null; }
  return res.json();
}
async function apiPost(path, body) {
  const token = getToken();
  const res = await fetch(API_BASE + path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': 'Bearer ' + token } : {}) },
    body: JSON.stringify(body)
  });
  if (res.status === 401) { location.href = 'login.html?redirect=mypage.html'; return null; }
  return res.json();
}
async function apiPut(path, body) {
  const token = getToken();
  const res = await fetch(API_BASE + path, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': 'Bearer ' + token } : {}) },
    body: JSON.stringify(body)
  });
  if (res.status === 401) { location.href = 'login.html?redirect=mypage.html'; return null; }
  return res.json();
}

/* ── 전역 상태 ── */
let currentUser   = null;
let allOrders     = [];
let allReservations = [];
let currentOrderFilter = 'all';
let cancelTargetOrderId = null;
let cancelTargetResId   = null;
let editingCarIdx = -1;

/* 차량 모델 데이터 */
const CAR_MODELS = {
  '현대': ['아반떼','소나타','그랜저','투싼','싼타페','팰리세이드','코나','아이오닉5','아이오닉6','스타리아','포터'],
  '기아': ['K3','K5','K8','K9','스포티지','쏘렌토','카니발','모하비','EV6','셀토스','레이','봉고'],
  '제네시스': ['G70','G80','G90','GV70','GV80','GV60'],
  '쉐보레': ['말리부','트랙스','트레일블레이저','이쿼녹스','콜로라도'],
  '르노코리아': ['QM6','XM3','SM6','아르카나'],
  'KGM': ['티볼리','코란도','렉스턴','토레스','무쏘'],
  'BMW': ['3시리즈','5시리즈','7시리즈','X3','X5','X6','i4','iX'],
  '벤츠': ['C클래스','E클래스','S클래스','GLC','GLE','A클래스'],
  '아우디': ['A4','A6','A8','Q5','Q7','Q8','e-tron'],
  '폭스바겐': ['골프','파사트','티구안','투아렉'],
  '기타': ['기타 차량']
};

/* =====================================================
   초기화
===================================================== */
document.addEventListener('DOMContentLoaded', async () => {
  const token = localStorage.getItem('tt_token') || sessionStorage.getItem('tt_token');
  if (!token) {
    location.href = 'login.html?redirect=mypage.html';
    return;
  }

  // 서버에서 내 정보 로드
  await loadMyInfo();
  if (!currentUser) {
    location.href = 'login.html?redirect=mypage.html';
    return;
  }

  loadAllData();

  /* URL 탭 파라미터 */
  const tab = new URLSearchParams(location.search).get('tab');
  if (tab) switchTab(null, tab);

  /* 연식 옵션 생성 */
  const yearSel = document.getElementById('carYear');
  const thisYear = new Date().getFullYear();
  for (let y = thisYear; y >= 1990; y--) {
    const opt = document.createElement('option');
    opt.value = y; opt.textContent = y + '년';
    yearSel.appendChild(opt);
  }
});

/* ── 내 정보 API 로드 ── */
async function loadMyInfo() {
  try {
    const res = await apiGet('/auth/me');
    if (res?.success && res.data) {
      currentUser = res.data;
      // localStorage 동기화 (헤더 반영)
      localStorage.setItem('tt_user', JSON.stringify(currentUser));
    } else {
      currentUser = null;
    }
  } catch(e) {
    console.error('내 정보 로드 실패:', e);
    currentUser = null;
  }
}

/* ── 전체 데이터 로드 ── */
async function loadAllData() {
  await loadMyInfo();

  renderSidebarProfile();
  await loadOrders();
  await loadReservations();
  renderWishlist();
  renderReviews();
  renderCoupons();
  renderPoints();
  renderProfile();
  renderCars();
}

/* =====================================================
   사이드바 프로필
===================================================== */
function renderSidebarProfile() {
  const u = currentUser;
  if (!u) return;

  document.getElementById('sidebarAvatar').textContent = (u.name || 'U')[0].toUpperCase();
  document.getElementById('sidebarName').textContent   = u.name  || '회원';
  document.getElementById('sidebarEmail').textContent  = u.email || '-';
  document.getElementById('sidebarPoint').textContent  = (u.point || 0).toLocaleString() + 'P';

  /* 등급 계산 */
  const totalSpent = allOrders
    .filter(o => o.userId === u.id && o.status !== 'cancelled')
    .reduce((s, o) => s + (o.totalPrice || 0), 0);
  let grade = '일반 회원', icon = '⭐';
  if (totalSpent >= 5000000) { grade = 'VIP'; icon = '💎'; }
  else if (totalSpent >= 1000000) { grade = '골드'; icon = '🥇'; }
  else if (totalSpent >= 300000) { grade = '실버'; icon = '🥈'; }
  document.getElementById('sidebarGrade').textContent = `${icon} ${grade}`;

  /* 쿠폰 배지 */
  const couponCnt = (u.coupons || []).length;
  const badge = document.getElementById('sidebarCouponBadge');
  if (couponCnt > 0) {
    badge.style.display = 'flex';
    badge.textContent = couponCnt;
  } else {
    badge.style.display = 'none';
  }
}

   탭 전환
===================================================== */
function switchTab(btn, tabId) {
  /* 사이드바 */
  document.querySelectorAll('.sidebar-nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tabId);
  });
  /* 모바일 탭바 */
  document.querySelectorAll('.mobile-tab-item').forEach(el => {
    el.classList.remove('active');
  });
  /* 섹션 */
  document.querySelectorAll('.mypage-section').forEach(el => {
    el.classList.toggle('active', el.id === 'tab-' + tabId);
  });
  /* URL 업데이트 */
  history.replaceState(null, '', '?tab=' + tabId);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

      delivered: { label:'배송완료', cls:'status-delivered' },

/* 주문 취소 */
function openCancelOrder(orderId) {
  cancelTargetOrderId = orderId;
  openModal('cancelOrderModal');
}

async function confirmCancelOrder() {
  if (!cancelTargetOrderId) return;
  const reason = document.getElementById('cancelReason').value;
  try {
    const res = await apiPut('/orders/' + cancelTargetOrderId + '/status', { status: 'cancelled', memo: reason });
    if (res?.success || res?.error === undefined) {
      closeModal('cancelOrderModal');
      cancelTargetOrderId = null;
      await loadOrders();
      if (typeof showToast === 'function') showToast('주문 취소', '주문이 취소되었습니다.', 'success');
    } else {
      if (typeof showToast === 'function') showToast('오류', res.error || '취소 처리 중 오류가 발생했습니다.', 'error');
    }
  } catch(e) {
    if (typeof showToast === 'function') showToast('오류', '서버 오류가 발생했습니다.', 'error');
  }
}

/* 반품 신청 */
async function requestReturn(orderId) {
  try {
    await apiPut('/orders/' + orderId + '/status', { status: 'return_requested' });
    await loadOrders();
    if (typeof showToast === 'function') showToast('반품 신청', '반품 신청이 접수되었습니다.', 'info');
  } catch(e) {
    if (typeof showToast === 'function') showToast('오류', '서버 오류가 발생했습니다.', 'error');
  }
}

/* =====================================================
   쿠폰함
===================================================== */
function renderCoupons() {
  const userCoupons = currentUser?.coupons || [];
  const allCoupons  = [];  // 쿠폰 API 미구현 - 빈 배열 처리

  /* 보유 쿠폰 데이터 조합 */
  const myCoupons = userCoupons.map(code => {
    const info = allCoupons.find(c => c.code === code);
    return info ? { ...info } : { code, name: code, discount: 0, discountType: 'amount', expire: null };
  });

  const now      = new Date();
  const in7days  = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);
  const expireSoon = myCoupons.filter(c => c.expire && new Date(c.expire) <= in7days && new Date(c.expire) >= now).length;
  const maxDisc    = myCoupons.reduce((max, c) => Math.max(max, c.discount || 0), 0);

  document.getElementById('couponTotal').textContent     = myCoupons.length;
  document.getElementById('couponExpireSoon').textContent = expireSoon;
  document.getElementById('couponDiscount').textContent   = maxDisc > 100 ? maxDisc.toLocaleString() + '원' : (maxDisc ? maxDisc + '%' : '-');

  const el = document.getElementById('couponList');
  if (!myCoupons.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎟️</div>
        <div class="empty-title">보유 쿠폰이 없습니다</div>
        <div class="empty-desc">이벤트 페이지에서 쿠폰을 받아보세요</div>
        <a href="event.html" class="empty-cta-btn">이벤트 보러가기</a>
      </div>`;
    return;
  }

  el.innerHTML = myCoupons.map(c => {
    const expired = c.expire && new Date(c.expire) < now;
    const soon    = c.expire && new Date(c.expire) <= in7days && !expired;
    const discText = c.discountType === 'percent' ? `${c.discount}%` : `${(c.discount || 0).toLocaleString()}원`;
    return `
      <div class="coupon-card" style="${expired ? 'opacity:.45;filter:grayscale(1);' : ''}">
        <div class="coupon-icon">🎟️</div>
        <div class="coupon-info">
          <div class="coupon-name">${c.name || c.code}</div>
          <div class="coupon-desc">${c.desc || '할인 쿠폰'}</div>
          <div class="coupon-expire">
            ${expired ? '<span style="color:var(--primary);">만료됨</span>' :
              soon ? `<span style="color:#d97706;">⚠️ ${c.expire} 만료 (곧 만료)</span>` :
              c.expire ? `유효기간: ${c.expire}` : '기간 제한 없음'}
          </div>
        </div>
        <div class="coupon-value">${discText} 할인</div>
      </div>`;
  }).join('');
}

async function registerCoupon() {
  const code = document.getElementById('couponCodeInput').value.trim().toUpperCase();
  if (!code) { if (typeof showToast === 'function') showToast('오류', '쿠폰 코드를 입력하세요.', 'error'); return; }
  try {
    const res = await apiPost('/coupons/register', { code });
    if (res?.success) {
      document.getElementById('couponCodeInput').value = '';
      renderCoupons();
      if (typeof showToast === 'function') showToast('쿠폰 등록', '쿠폰이 등록되었습니다!', 'success');
    } else {
      if (typeof showToast === 'function') showToast('오류', res?.error || '유효하지 않은 쿠폰 코드입니다.', 'error');
    }
  } catch(e) {
    if (typeof showToast === 'function') showToast('오류', '서버 오류가 발생했습니다.', 'error');
  }
}

/* =====================================================
   포인트
===================================================== */
function renderPoints() {
  const u = currentUser;
  if (!u) return;

  const history = u.pointHistory || [];
  const earned  = history.filter(h => h.type === 'earn').reduce((s, h) => s + (h.amount || 0), 0);
  const used    = history.filter(h => h.type === 'use').reduce((s, h) => s + (h.amount || 0), 0);

  document.getElementById('pointTotal').textContent  = (u.point || 0).toLocaleString() + 'P';
  document.getElementById('pointEarned').textContent = earned.toLocaleString() + 'P';
  document.getElementById('pointUsed').textContent   = used.toLocaleString() + 'P';

  const tbody = document.getElementById('pointHistoryBody');
  if (!history.length) {
    tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--gray4);">포인트 내역이 없습니다</td></tr>`;
    return;
  }
  tbody.innerHTML = [...history].reverse().map(h => `
    <tr>
      <td>${formatDate(h.date)}</td>
      <td>${h.desc || '-'}</td>
      <td><span style="padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;background:${h.type === 'earn' ? '#dcfce7' : '#fee2e2'};color:${h.type === 'earn' ? '#16a34a' : '#dc2626'};">${h.type === 'earn' ? '적립' : '사용'}</span></td>
      <td style="text-align:right;" class="${h.type === 'earn' ? 'point-earn' : 'point-use'}">${h.type === 'earn' ? '+' : '-'}${(h.amount || 0).toLocaleString()}P</td>
    </tr>`).join('');
}

/* =====================================================
   회원정보 수정
===================================================== */
function renderProfile() {
  const u = currentUser;
  if (!u) return;
  document.getElementById('profileName').value       = u.name  || '';
  document.getElementById('profileEmail').value      = u.email || '';
  document.getElementById('profilePhone').value      = u.phone || '';
  document.getElementById('profileBirth').value      = u.birth || '';
  document.getElementById('profileGender').value     = u.gender || '';
  document.getElementById('profileAddr').value       = u.address || '';
  document.getElementById('profileAddrDetail').value = u.addressDetail || '';
}

function resetProfile() {
  renderProfile();
  ['profilePwCurrent','profilePwNew','profilePwConfirm'].forEach(id => {
    document.getElementById(id).value = '';
  });
}

async function saveProfile() {
  const name    = document.getElementById('profileName').value.trim();
  const phone   = document.getElementById('profilePhone').value.trim();
  const pwCur   = document.getElementById('profilePwCurrent').value;
  const pwNew   = document.getElementById('profilePwNew').value;
  const pwConf  = document.getElementById('profilePwConfirm').value;

  if (!name) { if (typeof showToast === 'function') showToast('오류', '이름을 입력하세요.', 'error'); return; }
  if (phone && !/^01[0-9]-?\d{3,4}-?\d{4}$/.test(phone.replace(/-/g,''))) {
    if (typeof showToast === 'function') showToast('오류', '올바른 휴대폰 번호를 입력하세요.', 'error'); return;
  }
  if (pwNew) {
    if (pwNew.length < 8) { if (typeof showToast === 'function') showToast('오류', '새 비밀번호는 8자 이상이어야 합니다.', 'error'); return; }
    if (pwNew !== pwConf) { if (typeof showToast === 'function') showToast('오류', '새 비밀번호가 일치하지 않습니다.', 'error'); return; }
    if (!pwCur) { if (typeof showToast === 'function') showToast('오류', '현재 비밀번호를 입력하세요.', 'error'); return; }
    if (pwCur !== currentUser.password) { if (typeof showToast === 'function') showToast('오류', '현재 비밀번호가 틀렸습니다.', 'error'); return; }
  }

  try {
    const updateData = {
      name,
      phone,
      birth_date: document.getElementById('profileBirth').value,
      gender:     document.getElementById('profileGender').value,
      address:    document.getElementById('profileAddr').value,
      address_detail: document.getElementById('profileAddrDetail').value,
    };
    const res = await apiPut('/auth/me', updateData);
    if (pwNew) {
      await apiPut('/auth/password', { current_password: pwCur, new_password: pwNew });
    }
    await loadMyInfo();
    renderSidebarProfile();
    renderProfile();
    if (typeof showToast === 'function') showToast('저장 완료', '회원정보가 수정되었습니다.', 'success');
    document.getElementById('profilePwCurrent').value = '';
    document.getElementById('profilePwNew').value      = '';
    document.getElementById('profilePwConfirm').value  = '';
  } catch(e) {
    if (typeof showToast === 'function') showToast('오류', '저장 중 오류가 발생했습니다.', 'error');
  }
}

function searchProfileAddress() {
  if (typeof daum !== 'undefined' && daum.Postcode) {
    new daum.Postcode({
      oncomplete: function (data) {
        document.getElementById('profileAddr').value = data.roadAddress || data.jibunAddress;
        document.getElementById('profileAddrDetail').focus();
      }
    }).open();
  } else {
    const addr = prompt('주소를 입력하세요:');
    if (addr) document.getElementById('profileAddr').value = addr;
  }
}

/* =====================================================
   내 차량
===================================================== */
function renderCars() {
  const cars = currentUser?.cars || [];
  const el   = document.getElementById('carList');
  if (!el) return;

  if (!cars.length) {
    el.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🚗</div>
        <div class="empty-title">등록된 차량이 없습니다</div>
        <div class="empty-desc">내 차량을 등록하면 맞춤 타이어를 추천받을 수 있어요</div>
        <button onclick="openCarModal()" class="empty-cta-btn">🚗 차량 추가하기</button>
      </div>`;
    /* ❌ openCarModal() 자동 호출 없음 */
    return;
  }

  el.innerHTML = `<div class="cars-grid">${cars.map((car, idx) => `
    <div class="car-card ${idx === 0 ? 'main-car' : ''}">
      ${idx === 0 ? '<div class="car-main-badge">대표</div>' : ''}
      <div class="car-icon">🚗</div>
      <div class="car-model">${car.brand || ''} ${car.model || '차량명 미입력'}</div>
      <div class="car-meta">${[car.year ? car.year + '년' : '', car.size].filter(Boolean).join(' · ') || '정보 미입력'}</div>
      ${car.memo ? `<div style="font-size:12px;color:var(--gray4);margin-bottom:10px;">📝 ${car.memo}</div>` : ''}
      <div class="car-actions">
        <button class="car-btn car-btn-edit" onclick="editCar(${idx})">✏️ 수정</button>
        <button class="car-btn car-btn-del"  onclick="deleteCar(${idx})">🗑️ 삭제</button>
      </div>
    </div>`).join('')}</div>`;
}

function updateCarModels() {
  const brand = document.getElementById('carBrand').value;
  const sel   = document.getElementById('carModel');
  const models = CAR_MODELS[brand] || [];
  sel.innerHTML = '<option value="">모델 선택</option>' +
    models.map(m => `<option value="${m}">${m}</option>`).join('');
}

function openCarModal(idx = -1) {
  editingCarIdx = idx;
  document.getElementById('carModalTitle').textContent = idx === -1 ? '🚗 차량 추가' : '🚗 차량 수정';
  document.getElementById('carEditIdx').value = idx;

  /* 초기화 */
  ['carBrand','carModel','carModelDirect','carSize','carMemo'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('carYear').value = new Date().getFullYear();

  if (idx !== -1) {
    const car = currentUser?.cars?.[idx];
    if (car) {
      document.getElementById('carBrand').value       = car.brand || '';
      document.getElementById('carYear').value        = car.year  || new Date().getFullYear();
      document.getElementById('carSize').value        = car.size  || '';
      document.getElementById('carMemo').value        = car.memo  || '';
      updateCarModels();
      document.getElementById('carModel').value       = car.model || '';
      document.getElementById('carModelDirect').value = car.modelDirect || '';
    }
  }
  openModal('carModal');
}

function editCar(idx) { openCarModal(idx); }

function saveCar() {
  const brand       = document.getElementById('carBrand').value;
  const model       = document.getElementById('carModelDirect').value.trim() ||
                      document.getElementById('carModel').value;
  const year        = document.getElementById('carYear').value;
  const size        = document.getElementById('carSize').value.trim();
  const memo        = document.getElementById('carMemo').value.trim();
  const modelDirect = document.getElementById('carModelDirect').value.trim();

  if (!brand) { if (typeof showToast === 'function') showToast('오류', '브랜드를 선택하세요.', 'error'); return; }
  if (!model) { if (typeof showToast === 'function') showToast('오류', '차량 모델을 선택하거나 입력하세요.', 'error'); return; }

  const carObj = { brand, model, year: parseInt(year), size, memo, modelDirect };

  // 차량 정보는 currentUser 로컬 객체에만 임시 저장 (API 미구현)
  if (!currentUser.cars) currentUser.cars = [];
  const idx = parseInt(document.getElementById('carEditIdx').value);
  if (idx === -1) { currentUser.cars.push(carObj); }
  else            { currentUser.cars[idx] = carObj; }

  closeModal('carModal');
  renderCars();
  if (typeof showToast === 'function') showToast('저장 완료', `차량이 ${idx === -1 ? '추가' : '수정'}되었습니다.`, 'success');
}

function deleteCar(idx) {
  if (!confirm('차량을 삭제하시겠습니까?')) return;
  if (!currentUser.cars) return;
  currentUser.cars = currentUser.cars.filter((_, i) => i !== idx);
  renderCars();
  if (typeof showToast === 'function') showToast('삭제 완료', '차량이 삭제되었습니다.', 'info');
}

/* =====================================================
   모달 유틸
===================================================== */
function openModal(id) {
  const el = document.getElementById(id);
  if (el) el.classList.add('open');
}
function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  }
});
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('open');
  });
});

/* =====================================================
   유틸 함수
===================================================== */
function formatDate(dateStr) {
  if (!dateStr) return '-';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
