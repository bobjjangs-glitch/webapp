<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>대시보드 – TireTop Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />
  <style>
    /* ── 대시보드 전용 추가 스타일 ── */

    /* 웰컴 배너 */
    .welcome-banner {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%);
      border-radius: 20px;
      padding: 32px 36px;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(99,102,241,0.35);
    }
    .welcome-banner::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 220px; height: 220px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }
    .welcome-banner::after {
      content: '';
      position: absolute;
      bottom: -80px; right: 120px;
      width: 180px; height: 180px;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }
    .welcome-left { position: relative; z-index: 1; }
    .welcome-greeting {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      font-weight: 500;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .welcome-title {
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.6px;
      margin-bottom: 10px;
    }
    .welcome-meta {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .welcome-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .welcome-right {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 12px;
    }
    .banner-quick-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 14px;
      padding: 14px 18px;
      color: #fff;
      cursor: pointer;
      transition: all 0.22s ease;
      font-family: inherit;
      text-decoration: none;
    }
    .banner-quick-btn:hover {
      background: rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }
    .banner-quick-btn .bq-icon { font-size: 22px; }
    .banner-quick-btn .bq-label { font-size: 11px; font-weight: 600; white-space: nowrap; }

    /* KPI 카드 */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }
    .kpi-card {
      background: #fff;
      border-radius: 16px;
      padding: 22px;
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      transition: all 0.22s ease;
      cursor: default;
      position: relative;
      overflow: hidden;
    }
    .kpi-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .kpi-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .kpi-icon-wrap {
      width: 46px; height: 46px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .kpi-trend {
      display: flex;
      align-items: center;
      gap: 3px;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 9px;
      border-radius: 20px;
    }
    .kpi-trend.up { background: #d1fae5; color: #065f46; }
    .kpi-trend.down { background: #fee2e2; color: #991b1b; }
    .kpi-value {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.8px;
      color: #0f172a;
      margin-bottom: 4px;
    }
    .kpi-label {
      font-size: 12px;
      color: #64748b;
      font-weight: 500;
    }
    .kpi-sub {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 6px;
    }
    /* 카드별 색상 */
    .kpi-card.c-purple .kpi-icon-wrap { background: linear-gradient(135deg, #ede9fe, #ddd6fe); }
    .kpi-card.c-blue   .kpi-icon-wrap { background: linear-gradient(135deg, #dbeafe, #bfdbfe); }
    .kpi-card.c-green  .kpi-icon-wrap { background: linear-gradient(135deg, #d1fae5, #a7f3d0); }
    .kpi-card.c-orange .kpi-icon-wrap { background: linear-gradient(135deg, #fef3c7, #fde68a); }
    /* 하단 진행 바 */
    .kpi-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: rgba(0,0,0,0.04);
    }
    .kpi-bar-fill {
      height: 100%;
      border-radius: 0 3px 3px 0;
      transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    .c-purple .kpi-bar-fill { background: linear-gradient(90deg, #6366f1, #8b5cf6); }
    .c-blue   .kpi-bar-fill { background: linear-gradient(90deg, #3b82f6, #06b6d4); }
    .c-green  .kpi-bar-fill { background: linear-gradient(90deg, #10b981, #059669); }
    .c-orange .kpi-bar-fill { background: linear-gradient(90deg, #f59e0b, #ef4444); }

    /* 대시보드 메인 그리드 */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      margin-bottom: 20px;
    }
    .dash-grid-full { margin-bottom: 20px; }

    /* 매출 차트 카드 */
    .chart-header {
      padding: 20px 24px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .chart-title-group {}
    .chart-main-title { font-size: 16px; font-weight: 800; letter-spacing: -0.3px; }
    .chart-sub { font-size: 12px; color: #64748b; margin-top: 2px; }
    .chart-period-tabs {
      display: flex;
      gap: 3px;
      background: #f1f5f9;
      border-radius: 10px;
      padding: 3px;
    }
    .cpt-btn {
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      border: none;
      background: none;
      font-family: inherit;
      transition: all 0.2s;
    }
    .cpt-btn.active {
      background: #fff;
      color: #6366f1;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }
    .chart-area { padding: 20px 24px 24px; }
    /* 간단 SVG 라인 차트 래퍼 */
    .line-chart-wrap { position: relative; height: 200px; }
    .chart-svg { width: 100%; height: 100%; overflow: visible; }
    /* 차트 레전드 */
    .chart-legend {
      display: flex;
      gap: 18px;
      margin-bottom: 12px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #64748b;
      font-weight: 500;
    }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    /* Y축 라벨 */
    .chart-y-labels {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      font-size: 10px;
      color: #94a3b8;
      padding: 4px 0;
      pointer-events: none;
    }

    /* 도넛 차트 카드 */
    .donut-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .donut-svg-wrap { position: relative; width: 160px; height: 160px; margin-bottom: 16px; }
    .donut-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .donut-center-val { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
    .donut-center-label { font-size: 11px; color: #64748b; }
    .donut-legend { width: 100%; }
    .donut-legend-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      font-size: 12px;
    }
    .donut-legend-item:last-child { border-bottom: none; }
    .donut-legend-left { display: flex; align-items: center; gap: 8px; }
    .donut-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .donut-legend-name { color: #374151; font-weight: 500; }
    .donut-legend-right { display: flex; align-items: center; gap: 8px; }
    .donut-legend-pct { font-weight: 700; color: #0f172a; }
    .donut-legend-val { font-size: 11px; color: #94a3b8; }

    /* 최근 주문 테이블 */
    .order-status {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .order-status::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }
    .os-pending  { background: #fef3c7; color: #d97706; }
    .os-paid     { background: #dbeafe; color: #1d4ed8; }
    .os-shipping { background: #ede9fe; color: #7c3aed; }
    .os-done     { background: #d1fae5; color: #059669; }
    .os-cancel   { background: #fee2e2; color: #dc2626; }

    /* 빠른 작업 그리드 */
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .quick-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 20px 12px;
      border-radius: 14px;
      border: 1.5px solid rgba(0,0,0,0.06);
      background: #fff;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.22s ease;
      text-align: center;
    }
    .quick-item:hover {
      border-color: #6366f1;
      background: linear-gradient(135deg, rgba(99,102,241,0.04), rgba(139,92,246,0.03));
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(99,102,241,0.12);
    }
    .quick-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .quick-label { font-size: 12px; font-weight: 600; color: #374151; }
    .quick-desc { font-size: 11px; color: #94a3b8; }

    /* 알림/이슈 카드 */
    .alert-list { display: flex; flex-direction: column; gap: 0; }
    .alert-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 22px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      transition: background 0.2s;
    }
    .alert-item:last-child { border-bottom: none; }
    .alert-item:hover { background: #f8fafc; }
    .alert-dot-wrap {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .alert-dot-wrap.warn { background: #fef3c7; }
    .alert-dot-wrap.danger { background: #fee2e2; }
    .alert-dot-wrap.info { background: #dbeafe; }
    .alert-dot-wrap.success { background: #d1fae5; }
    .alert-body { flex: 1; }
    .alert-title { font-size: 13px; font-weight: 600; color: #0f172a; margin-bottom: 2px; }
    .alert-desc { font-size: 12px; color: #64748b; }
    .alert-time { font-size: 11px; color: #94a3b8; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }

    /* 활동 피드 */
    .activity-feed { display: flex; flex-direction: column; }
    .activity-item {
      display: flex;
      gap: 12px;
      padding: 12px 22px;
      position: relative;
    }
    .activity-item:not(:last-child)::after {
      content: '';
      position: absolute;
      left: 38px; top: 46px;
      width: 1px; height: calc(100% - 20px);
      background: linear-gradient(to bottom, rgba(0,0,0,0.08), transparent);
    }
    .activity-avatar {
      width: 32px; height: 32px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #ede9fe, #ddd6fe);
    }
    .activity-body { flex: 1; }
    .activity-text { font-size: 13px; color: #374151; line-height: 1.5; }
    .activity-text strong { color: #0f172a; font-weight: 700; }
    .activity-time { font-size: 11px; color: #94a3b8; margin-top: 2px; }

    /* 재고 경고 리스트 */
    .stock-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 22px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .stock-item:last-child { border-bottom: none; }
    .stock-thumb {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .stock-info { flex: 1; min-width: 0; }
    .stock-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .stock-cat { font-size: 11px; color: #94a3b8; margin-top: 1px; }
    .stock-right { text-align: right; flex-shrink: 0; }
    .stock-qty { font-size: 15px; font-weight: 800; }
    .stock-qty.danger { color: #ef4444; }
    .stock-qty.warning { color: #f59e0b; }
    .stock-unit { font-size: 11px; color: #94a3b8; }
    .stock-bar-wrap { width: 80px; height: 4px; background: #f1f5f9; border-radius: 4px; margin-top: 4px; }
    .stock-bar-fill { height: 100%; border-radius: 4px; }
    .stock-bar-fill.danger { background: linear-gradient(90deg, #ef4444, #f43f5e); }
    .stock-bar-fill.warning { background: linear-gradient(90deg, #f59e0b, #fb923c); }

    /* 매출 랭킹 */
    .rank-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 22px;
      border-bottom: 1px solid rgba(0,0,0,0.05);
      transition: background 0.2s;
    }
    .rank-item:hover { background: #f8fafc; }
    .rank-item:last-child { border-bottom: none; }
    .rank-num {
      width: 24px;
      font-size: 14px;
      font-weight: 800;
      text-align: center;
      flex-shrink: 0;
    }
    .rank-num.gold { color: #f59e0b; }
    .rank-num.silver { color: #94a3b8; }
    .rank-num.bronze { color: #d97706; }
    .rank-img {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .rank-info { flex: 1; min-width: 0; }
    .rank-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rank-cat { font-size: 11px; color: #94a3b8; }
    .rank-right { text-align: right; flex-shrink: 0; }
    .rank-sales { font-size: 14px; font-weight: 800; color: #0f172a; }
    .rank-cnt { font-size: 11px; color: #94a3b8; margin-top: 1px; }

    /* 섹션 라벨 */
    .dash-section-label {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.4px;
      color: #0f172a;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dash-section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(0,0,0,0.08), transparent);
    }

    @media (max-width: 1200px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .dash-grid { grid-template-columns: 1fr; }
      .quick-grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 768px) {
      .welcome-banner { flex-direction: column; gap: 20px; }
      .welcome-right { width: 100%; justify-content: flex-start; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .quick-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .kpi-grid { grid-template-columns: 1fr; }
      .quick-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div id="tt-admin-header"></div>

<main class="admin-main" id="adminMain">
  <div class="admin-content">

    <!-- ══ 웰컴 배너 ══ -->
    <div class="welcome-banner" id="welcomeBanner">
      <div class="welcome-left">
        <div class="welcome-greeting">
          <span id="greetEmoji">👋</span>
          <span id="greetText">안녕하세요</span>
        </div>
        <div class="welcome-title" id="welcomeName">관리자님, 환영합니다!</div>
        <div class="welcome-meta">
          <span class="welcome-chip">📅 <span id="todayDate"></span></span>
          <span class="welcome-chip">🕐 <span id="nowTime"></span></span>
          <span class="welcome-chip">🔥 오늘 주문 <strong id="todayOrderCount">24</strong>건</span>
        </div>
      </div>
      <div class="welcome-right">
        <a href="orders.html" class="banner-quick-btn">
          <span class="bq-icon">🛒</span>
          <span class="bq-label">주문 확인</span>
        </a>
        <a href="products.html" class="banner-quick-btn">
          <span class="bq-icon">➕</span>
          <span class="bq-label">상품 등록</span>
        </a>
        <a href="cs.html" class="banner-quick-btn">
          <span class="bq-icon">💬</span>
          <span class="bq-label">문의 답변</span>
        </a>
        <a href="stats.html" class="banner-quick-btn">
          <span class="bq-icon">📈</span>
          <span class="bq-label">통계 보기</span>
        </a>
      </div>
    </div>

    <!-- ══ KPI 카드 ══ -->
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- ══ 메인 그리드: 매출 차트 + 카테고리 도넛 ══ -->
    <div class="dash-grid">

      <!-- 매출 라인 차트 -->
      <div class="admin-card" style="overflow:visible;">
        <div class="chart-header">
          <div class="chart-title-group">
            <div class="chart-main-title">매출 추이</div>
            <div class="chart-sub">최근 기간별 매출 현황</div>
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="chart-period-tabs" id="chartTabs">
              <button class="cpt-btn active" data-period="week">7일</button>
              <button class="cpt-btn" data-period="month">30일</button>
              <button class="cpt-btn" data-period="quarter">3개월</button>
            </div>
          </div>
        </div>
        <div class="chart-area">
          <div class="chart-legend">
            <div class="legend-item"><div class="legend-dot" style="background:#6366f1"></div>매출액</div>
            <div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>주문수</div>
          </div>
          <div class="line-chart-wrap">
            <svg class="chart-svg" id="salesSvg" viewBox="0 0 700 200" preserveAspectRatio="none"></svg>
          </div>
          <!-- X축 라벨 -->
          <div id="chartXLabels" style="display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:#94a3b8;padding:0 2px;"></div>
        </div>
        <!-- 차트 하단 합계 -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid rgba(0,0,0,0.06);">
          <div style="padding:16px 22px;border-right:1px solid rgba(0,0,0,0.06);">
            <div style="font-size:11px;color:#94a3b8;margin-bottom:4px;">기간 총 매출</div>
            <div style="font-size:18px;font-weight:800;letter-spacing:-0.5px;" id="chartTotalSales">₩0</div>
          </div>
          <div style="padding:16px 22px;border-right:1px solid rgba(0,0,0,0.06);">

(function initDateTime() {
  const days = ['일','월','화','수','목','금','토'];
  function update() {
    const now = new Date();
    const dateStr = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
    const timeStr = now.toTimeString().slice(0,8);
    const el = document.getElementById('todayDate');
    const tel = document.getElementById('nowTime');
    if (el) el.textContent = dateStr;
    if (tel) tel.textContent = timeStr;

    // 인사말
    const h = now.getHours();
    const greet = document.getElementById('greetText');
    const emoji = document.getElementById('greetEmoji');
    if (greet) {
      if (h < 6)       { greet.textContent = '늦은 밤이에요'; emoji.textContent = '🌙'; }
      else if (h < 12) { greet.textContent = '좋은 아침이에요'; emoji.textContent = '☀️'; }
      else if (h < 18) { greet.textContent = '좋은 오후예요'; emoji.textContent = '🌤️'; }
      else             { greet.textContent = '좋은 저녁이에요'; emoji.textContent = '🌆'; }

  }
  update();
  setInterval(update, 1000);

  // 관리자 이름
  try {

    const wn = document.getElementById('welcomeName');
    if (wn && ad.name) wn.textContent = ad.name + '님, 환영합니다!';

function renderLineChart(period) {
  const d = CHART_DATA[period];
  const svg = document.getElementById('salesSvg');
  const xlabels = document.getElementById('chartXLabels');
  if (!svg || !d) return;

  const W = 700, H = 200, PAD = { top: 16, right: 10, bottom: 10, left: 10 };
  const maxSales = Math.max(...d.sales);
  const maxOrders = Math.max(...d.orders);
  const n = d.sales.length;

  function sx(i) { return PAD.left + (i / (n-1)) * (W - PAD.left - PAD.right); }
  function sy(v, max) { return PAD.top + (1 - v/max) * (H - PAD.top - PAD.bottom); }

  // 그리드
  let gridLines = '';
  for (let i = 0; i <= 4; i++) {
    const y = PAD.top + (i/4) * (H - PAD.top - PAD.bottom);
    gridLines += `<line x1="${PAD.left}" y1="${y}" x2="${W - PAD.right}" y2="${y}" stroke="rgba(0,0,0,0.05)" stroke-width="1" />`;
  }

  // 매출 라인
  let salesPath = d.sales.map((v, i) => `${i===0?'M':'L'} ${sx(i)} ${sy(v, maxSales)}`).join(' ');
  let salesArea = salesPath + ` L ${sx(n-1)} ${H - PAD.bottom} L ${sx(0)} ${H - PAD.bottom} Z`;

  // 주문 라인 (스케일 조정)
  let ordersPath = d.orders.map((v, i) => `${i===0?'M':'L'} ${sx(i)} ${sy(v, maxOrders)}`).join(' ');

  // 포인트
  let salesDots = d.sales.map((v, i) => `<circle cx="${sx(i)}" cy="${sy(v, maxSales)}" r="4" fill="#fff" stroke="#6366f1" stroke-width="2.5" />`).join('');
  let ordersDots = d.orders.map((v, i) => `<circle cx="${sx(i)}" cy="${sy(v, maxOrders)}" r="3.5" fill="#fff" stroke="#10b981" stroke-width="2" />`).join('');

  svg.innerHTML = `
    <defs>
      <linearGradient id="salesGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#6366f1" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#6366f1" stop-opacity="0.01"/>
      </linearGradient>
    </defs>
    ${gridLines}
    <path d="${salesArea}" fill="url(#salesGrad)" />
    <path d="${salesPath}" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="${ordersPath}" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="0"/>
    ${salesDots}
    ${ordersDots}
  `;

  // X 라벨
  if (xlabels) xlabels.innerHTML = d.labels.map(l => `<span>${l}</span>`).join('');

  // 합계
  const totalSales = d.sales.reduce((a,b)=>a+b,0);
  const totalOrders = d.orders.reduce((a,b)=>a+b,0);
  document.getElementById('chartTotalSales').textContent = '₩' + totalSales.toLocaleString();
  document.getElementById('chartTotalOrders').textContent = totalOrders + '건';
  document.getElementById('chartAvgOrder').textContent = '₩' + Math.round(totalSales/totalOrders).toLocaleString();
}

function renderDonut() {
  const svg = document.getElementById('donutSvg');
  const legend = document.getElementById('donutLegend');
  if (!svg) return;

  const cx = 80, cy = 80, r = 64, innerR = 46;
  const total = CAT_DATA.reduce((a,b)=>a+b.pct, 0);
  let start = -Math.PI / 2;
  let paths = '';

  CAT_DATA.forEach(d => {
    const angle = (d.pct / total) * 2 * Math.PI;
    const end = start + angle;
    const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start);
    const x2 = cx + r * Math.cos(end),   y2 = cy + r * Math.sin(end);
    const xi1 = cx + innerR * Math.cos(end),   yi1 = cy + innerR * Math.sin(end);
    const xi2 = cx + innerR * Math.cos(start), yi2 = cy + innerR * Math.sin(start);
    const large = angle > Math.PI ? 1 : 0;
    paths += `<path d="M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${xi1} ${yi1} A ${innerR} ${innerR} 0 ${large} 0 ${xi2} ${yi2} Z"
      fill="${d.color}" opacity="0.9"
      style="transition:opacity 0.2s; cursor:pointer;"
      onmouseenter="this.style.opacity=1;this.style.transform='scale(1.03)';this.style.transformOrigin='80px 80px'"
      onmouseleave="this.style.opacity=0.9;this.style.transform=''"
    />`;
    start = end;
  });

  svg.innerHTML = paths;
  document.getElementById('donutTotal').textContent = '78%';

  if (legend) {
    legend.innerHTML = CAT_DATA.map(d => `
      <div class="donut-legend-item">
        <div class="donut-legend-left">
          <div class="donut-legend-dot" style="background:${d.color}"></div>
          <span class="donut-legend-name">${d.name}</span>
        </div>
        <div class="donut-legend-right">
          <span class="donut-legend-pct">${d.pct}%</span>
          <span class="donut-legend-val">${d.val}</span>
        </div>
      </div>
    `).join('');
  }
}

  { icon:'💬', text:'<strong>이영희</strong>님이 문의를 남겼습니다.', time:'23분 전' },
  { icon:'✅', text:'<strong>관리자</strong>가 ORD-2428 배송완료 처리했습니다.', time:'1시간 전' },
  { icon:'👤', text:'신규 회원 <strong>박도윤</strong>님이 가입했습니다.', time:'2시간 전' },
  { icon:'⭐', text:'<strong>최지수</strong>님이 미쉐린 타이어에 리뷰를 남겼습니다.', time:'3시간 전' },
  { icon:'📦', text:'한국타이어 225/60R17 재고를 <strong>50개</strong> 입고했습니다.', time:'5시간 전' },
];

function renderActivity() {
  const feed = document.getElementById('activityFeed');
  if (!feed) return;
  feed.innerHTML = ACTIVITIES.map(a => `
    <div class="activity-item">
      <div class="activity-avatar">${a.icon}</div>
      <div class="activity-body">
        <div class="activity-text">${a.text}</div>
        <div class="activity-time">${a.time}</div>
      </div>
    </div>
  `).join('');
}
renderActivity();

function renderQuickMenus() {
  const grid = document.getElementById('quickGrid');
  if (!grid) return;
  grid.innerHTML = QUICK_MENUS.map(m => `
    <a href="${m.href}" class="quick-item">
      <div class="quick-icon" style="background:${m.bg}">${m.icon}</div>
      <div class="quick-label">${m.label}</div>
      <div class="quick-desc">${m.desc}</div>
    </a>
  `).join('');
}
renderQuickMenus();
