<!-- 탑바 -->
<div class="admin-topbar" id="adminTopbar">
  <button class="sidebar-toggle-btn" id="sidebarToggle" onclick="adminLoader.toggleSidebar()">☰</button>
  <div class="topbar-title" id="topbarTitle">대시보드</div>

  <div class="topbar-search">
    <span>🔍</span>
    <input type="text" placeholder="통합 검색..." id="adminGlobalSearch"
           onkeydown="if(event.key==='Enter') adminLoader.globalSearch(this.value)">
  </div>

  <div class="topbar-actions">
    <!-- 알림 -->
    <button class="topbar-icon-btn" onclick="adminLoader.toggleNotify()" title="알림">
      🔔
      <span class="badge" id="notifyBadge" style="display:none">0</span>
    </button>

    <!-- 사이트 바로가기 -->
    <a href="/index.html" target="_blank" class="topbar-icon-btn" title="사이트 보기">🌐</a>

    <!-- 프로필 드롭다운 -->
    <div class="profile-dropdown-wrap">
      <button class="topbar-icon-btn profile-btn" onclick="adminLoader.toggleProfileMenu()">
        <span id="topbarAvatar">👤</span>
      </button>
      <div class="profile-dropdown" id="profileDropdown">
        <div class="profile-dropdown-header">
          <strong id="dropdownName">관리자</strong>
          <span id="dropdownEmail">admin@tiretop.co.kr</span>
        </div>
        <a href="/admin/settings.html" class="profile-dropdown-item">⚙️ 계정 설정</a>
        <a href="/index.html" target="_blank" class="profile-dropdown-item">🌐 사이트 보기</a>
        <div class="profile-dropdown-divider"></div>
        <button class="profile-dropdown-item danger" onclick="adminLoader.doLogout()">🚪 로그아웃</button>
      </div>
    </div>
  </div>

  <!-- 알림 패널 -->
  <div class="notify-panel" id="notifyPanel">
    <div class="notify-panel-header">
      <strong>알림</strong>
      <button onclick="adminLoader.markAllRead()">모두 읽음</button>
    </div>
    <div class="notify-list" id="notifyList">
      <!-- JS로 렌더링 -->
    </div>
  </div>
</div>
