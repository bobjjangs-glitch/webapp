<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>예약 관리 – TIRETOP Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .calendar-wrap {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .cal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .cal-header h3 { font-size: 16px; font-weight: 700; }
    .cal-nav { display: flex; gap: 6px; }
    .cal-nav button {
      width: 32px; height: 32px; border-radius: 8px;
      border: 1px solid var(--border); background: #fff;
      cursor: pointer; font-size: 14px; transition: background 0.2s;
    }
    .cal-nav button:hover { background: var(--surface); }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      padding: 12px;
      gap: 4px;
    }
    .cal-dow {
      text-align: center; font-size: 11px; font-weight: 700;
      color: var(--text-muted); padding: 6px 0;
    }
    .cal-day {
      min-height: 72px; border-radius: 8px;
      padding: 6px; cursor: pointer;
      transition: background 0.15s;
      border: 1px solid transparent;
    }
    .cal-day:hover { background: var(--surface); }
    .cal-day.today    { border-color: var(--admin-accent); background: #fff8f8; }
    .cal-day.selected { background: #fff0f0; border-color: var(--admin-accent); }
    .cal-day.other-month .day-num { color: var(--border); }
    .day-num {
      font-size: 12px; font-weight: 700; color: var(--text);
      margin-bottom: 4px;
    }
    .day-dots { display: flex; flex-wrap: wrap; gap: 2px; }
    .day-dot {
      font-size: 10px; background: #fff0f0; color: var(--admin-accent);
      border-radius: 4px; padding: 1px 5px; font-weight: 600;
    }
    .time-slot-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    }
    .time-slot {
      padding: 10px 8px; border-radius: 8px; text-align: center;
      border: 1px solid var(--border); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .time-slot.empty  { color: var(--text-muted); }
    .time-slot.booked { background: #fff0f0; border-color: var(--admin-accent); color: var(--admin-accent); }
    .time-slot.full   { background: var(--surface); color: var(--border); cursor: not-allowed; }
    .time-slot .slot-cnt {
      display: block; font-size: 10px; font-weight: 400;
      margin-top: 2px; opacity: 0.75;
    }
    .reserve-status-bar {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
    }
    .rs-chip {
      padding: 6px 14px; border-radius: 20px; font-size: 12px;
      font-weight: 600; cursor: pointer; border: 1px solid var(--border);
      transition: all 0.2s; background: #fff;
    }
    .rs-chip.active {
      background: var(--admin-accent); color: #fff;
      border-color: var(--admin-accent);
    }
  </style>
</head>
<body>
<div id="adminMain">

  <div class="page-header">
    <div>
      <h2>예약 관리</h2>
      <p>매장별 서비스 예약 현황을 캘린더로 확인하고 관리합니다.</p>
    </div>
    <button class="btn btn-primary" onclick="openAddReserveModal()">➕ 예약 추가</button>
  </div>

  <!-- 통계 -->
  <div class="stats-grid" id="reserveStats" style="margin-bottom:20px;"></div>

  <div style="display:grid;grid-template-columns:1fr 380px;gap:18px;align-items:start;">

    <!-- 캘린더 -->
    <div class="calendar-wrap">
      <div class="cal-header">
        <h3 id="calTitle"></h3>
        <div style="display:flex;align-items:center;gap:10px;">
          <select class="form-control" id="storeFilter"
                  style="width:auto;font-size:12px;padding:5px 10px;"
                  onchange="renderCalendar()">
            <option value="">전체 매장</option>
            <option>강남점</option><option>판교점</option><option>합정점</option>
            <option>송도점</option><option>잠실점</option><option>수원점</option>
          </select>
          <div class="cal-nav">
            <button onclick="changeMonth(-1)">◀</button>
            <button onclick="goToday()">오늘</button>
            <button onclick="changeMonth(1)">▶</button>
          </div>
        </div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- 선택 날짜 상세 -->
    <div>
      <div class="card" style="margin-bottom:14px;">
        <div class="card-header">
          <span class="card-title" id="selectedDateTitle">날짜를 선택하세요</span>
        </div>
        <div style="padding:14px;">
          <div class="time-slot-grid" id="timeSlotGrid">
            <p style="grid-column:1/-1;text-align:center;
                      color:var(--text-muted);font-size:13px;padding:20px 0;">
              캘린더에서 날짜를 선택하세요.
            </p>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">예약 목록</span>
          <span id="dayReserveCnt" class="badge badge-primary"></span>
        </div>
        <div id="dayReserveList" style="max-height:320px;overflow-y:auto;">
          <p style="text-align:center;color:var(--text-muted);
                    font-size:13px;padding:30px;">
            날짜를 선택하세요.
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- 전체 예약 목록 -->
  <div class="card" style="margin-top:20px;">
    <div class="card-header">
      <span class="card-title">전체 예약 목록</span>
    </div>
    <div style="padding:14px 18px;">
      <div class="reserve-status-bar" id="reserveStatusBar"></div>
      <div class="filter-bar" style="margin-bottom:12px;">
        <input class="filter-search" type="text" id="reserveSearch"
               placeholder="🔍 고객명, 매장, 서비스 검색..."
               oninput="renderReserveTable()">
        <select id="reserveStoreFilter" onchange="renderReserveTable()">
          <option value="">전체 매장</option>
          <option>강남점</option><option>판교점</option><option>합정점</option>
          <option>송도점</option><option>잠실점</option><option>수원점</option>
        </select>
        <div class="spacer"></div>
      </div>
    </div>
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead>
          <tr>
            <th>예약번호</th><th>고객</th><th>서비스</th><th>매장</th>
            <th>예약일시</th><th>금액</th><th>상태</th><th>관리</th>
          </tr>
        </thead>
        <tbody id="reserveTbody"></tbody>
      </table>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;
                padding:14px 18px;border-top:1px solid var(--border);">
      <span id="reservePageInfo"
            style="font-size:13px;color:var(--text-muted);"></span>
      <div id="reservePageBtns" style="display:flex;gap:4px;"></div>
    </div>
  </div>

</div>

<!-- 예약 상세/수정 모달 -->
<div class="admin-modal-overlay" id="reserveDetailModal">
  <div class="admin-modal">
    <div class="modal-header">
      <h3 id="reserveDetailTitle">예약 상세</h3>
      <button class="modal-close" onclick="closeModal('reserveDetailModal')">✕</button>
    </div>
    <div class="modal-body" id="reserveDetailBody"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('reserveDetailModal')">닫기</button>
      <button class="btn btn-primary" onclick="saveReserve()">저장</button>
    </div>
  </div>
</div>

<!-- 예약 추가 모달 -->
<div class="admin-modal-overlay" id="addReserveModal">
  <div class="admin-modal">
    <div class="modal-header">
      <h3>예약 추가</h3>
      <button class="modal-close" onclick="closeModal('addReserveModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">고객명 *</label>
          <input class="form-control" id="rName" placeholder="홍길동">
        </div>
        <div class="form-group">
          <label class="form-label">연락처 *</label>
          <input class="form-control" id="rPhone" placeholder="010-0000-0000">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">서비스</label>
        <select class="form-control" id="rService">
          <option>타이어 교체</option>
          <option>엔진오일 교환</option>
          <option>배터리 교체</option>
          <option>와이퍼 교체</option>
          <option>종합점검</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">매장</label>
        <select class="form-control" id="rStore">
          <option>강남점</option><option>판교점</option><option>합정점</option>
          <option>송도점</option><option>잠실점</option><option>수원점</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">예약일</label>
          <input class="form-control" id="rDate" type="date">
        </div>
        <div class="form-group">
          <label class="form-label">예약시간</label>
          <select class="form-control" id="rTime">
            <option>09:00</option><option>10:00</option><option>11:00</option>
            <option>13:00</option><option>14:00</option><option>15:00</option>
            <option>16:00</option><option>17:00</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">금액 (원)</label>
        <input class="form-control" id="rAmt" type="number" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">메모</label>
        <textarea class="form-control" id="rMemo"
                  style="min-height:60px;" placeholder="특이사항 등..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addReserveModal')">취소</button>
      <button class="btn btn-primary" onclick="addReserve()">예약 추가</button>
    </div>
  </div>
</div>

<script src="../js/store.js"></script>
<script src="js/admin-api.js"></script>
<script src="components/admin-loader.js"></script>
<script>
/* ══════════════════════════════
   데이터 – TTStore 연동
══════════════════════════════ */
let RESERVES = [];


const R_STATUS_BADGE = {
  대기:'badge-warning', 확정:'badge-info',
  완료:'badge-success', 취소:'badge-danger',
};

let curYear          = new Date().getFullYear();
let curMonth         = new Date().getMonth();
let selectedDate     = null;
let reservePage      = 1;
const RESERVE_PAGE   = 8;
let filterStatus     = '';
let editingReserveId = null;

/* ── 통계 ── */
function renderReserveStats() {
  const el    = document.getElementById('reserveStats');
  if (!el) return;
  const today = new Date().toISOString().slice(0,10);
  const todayList = RESERVES.filter(r => r.date === today);
  const pending   = RESERVES.filter(r => r.status === '대기').length;
  const confirmed = RESERVES.filter(r => r.status === '확정').length;
  const done      = RESERVES.filter(r => r.status === '완료').length;
  el.innerHTML = `
    <div class="stat-card"><div class="stat-icon blue">📅</div><div class="stat-info"><div class="stat-label">오늘 예약</div><div class="stat-value">${todayList.length}건</div></div></div>
    <div class="stat-card"><div class="stat-icon orange">⏳</div><div class="stat-info"><div class="stat-label">대기중</div><div class="stat-value">${pending}건</div></div></div>
    <div class="stat-card"><div class="stat-icon blue">✔️</div><div class="stat-info"><div class="stat-label">확정</div><div class="stat-value">${confirmed}건</div></div></div>
    <div class="stat-card"><div class="stat-icon green">✅</div><div class="stat-info"><div class="stat-label">완료</div><div class="stat-value">${done}건</div></div></div>`;
}

/* ══════════════════════════════
   캘린더
══════════════════════════════ */
const DOW      = ['일','월','화','수','목','금','토'];
const MONTH_KO = ['1월','2월','3월','4월','5월','6월',
                  '7월','8월','9월','10월','11월','12월'];

function renderCalendar() {
  const store   = document.getElementById('storeFilter').value;
  document.getElementById('calTitle').textContent =
    `${curYear}년 ${MONTH_KO[curMonth]}`;

  const firstDay = new Date(curYear, curMonth, 1);
  const lastDay  = new Date(curYear, curMonth+1, 0);
  const startDow = firstDay.getDay();
  const today    = new Date();

  /* 날짜별 예약 카운트 */
  const countMap = {};
  RESERVES.forEach(r => {
    if (store && r.store !== store) return;
    countMap[r.date] = (countMap[r.date] || 0) + 1;
  });

  let html = DOW.map(d => `<div class="cal-dow">${d}</div>`).join('');

  /* 이전 달 빈칸 */
  for (let i = 0; i < startDow; i++) {
    const d = new Date(curYear, curMonth, 1 - (startDow - i));
    html += `<div class="cal-day other-month">
               <div class="day-num">${d.getDate()}</div>
             </div>`;
  }

  /* 이번 달 */
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dateStr = `${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = today.getFullYear()===curYear
                 && today.getMonth()===curMonth
                 && today.getDate()===d;
    const isSel   = selectedDate === dateStr;
    const cnt     = countMap[dateStr] || 0;
    html += `
      <div class="cal-day ${isToday?'today':''} ${isSel?'selected':''}"
           onclick="selectDate('${dateStr}')">
        <div class="day-num">${d}</div>
        <div class="day-dots">
          ${cnt > 0 ? `<span class="day-dot">${cnt}건</span>` : ''}
        </div>
      </div>`;
  }

  /* 다음 달 빈칸 */
  const remain = 42 - (startDow + lastDay.getDate());
  for (let i = 1; i <= remain; i++) {
    html += `<div class="cal-day other-month">
               <div class="day-num">${i}</div>
             </div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
}

function changeMonth(dir) {
  curMonth += dir;
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  if (curMonth > 11) { curMonth = 0;  curYear++; }
  renderCalendar();
}

function goToday() {
  const now = new Date();
  curYear  = now.getFullYear();
  curMonth = now.getMonth();
  renderCalendar();
}

/* ══════════════════════════════
   날짜 선택
══════════════════════════════ */
const TIME_SLOTS = [
  '09:00','10:00','11:00','12:00','13:00',
  '14:00','15:00','16:00','17:00','18:00',
];

function selectDate(dateStr) {
  selectedDate = dateStr;
  renderCalendar();

  const [y,m,d] = dateStr.split('-');
  document.getElementById('selectedDateTitle').textContent =
    `${y}년 ${parseInt(m)}월 ${parseInt(d)}일 예약 현황`;

  const store   = document.getElementById('storeFilter').value;
  const dayList = RESERVES.filter(r =>
    r.date === dateStr && (!store || r.store === store));
  const timeMap = {};
  dayList.forEach(r => { timeMap[r.time] = (timeMap[r.time]||0)+1; });

  document.getElementById('timeSlotGrid').innerHTML =
    TIME_SLOTS.map(t => {
      const cnt = timeMap[t] || 0;
      const cls = cnt === 0 ? 'empty' : cnt >= 3 ? 'full' : 'booked';
      return `
        <div class="time-slot ${cls}" onclick="filterByTime('${t}')">
          ${t}
          <span class="slot-cnt">${cnt > 0 ? cnt+'건' : '여유'}</span>
        </div>`;
    }).join('');

  renderDayList(dayList);
}

function renderDayList(list) {
  const cnt = document.getElementById('dayReserveCnt');
  const el  = document.getElementById('dayReserveList');
  cnt.textContent = list.length + '건';
  if (!list.length) {
    el.innerHTML = `<p style="text-align:center;color:var(--text-muted);
                              font-size:13px;padding:30px;">예약이 없습니다.</p>`;
    return;
  }
  el.innerHTML = list.map(r => `
    <div style="padding:12px 16px;border-bottom:1px solid var(--border);
                display:flex;align-items:center;gap:10px;cursor:pointer;"
         onclick="openReserveDetail('${r.id}')">
      <div style="background:#fff0f0;color:var(--admin-accent);
                  font-size:12px;font-weight:700;
                  padding:4px 8px;border-radius:6px;flex-shrink:0;">
        ${r.time}
      </div>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:600;">
          ${r.customer} – ${r.service}
        </div>
        <div style="font-size:11px;color:var(--text-muted);">
          ${r.store} · ₩${r.amt.toLocaleString()}
        </div>
      </div>
      <span class="badge ${R_STATUS_BADGE[r.status]}">${r.status}</span>
    </div>`).join('');
}

function filterByTime(time) {
  const store = document.getElementById('storeFilter').value;
  const list  = RESERVES.filter(r =>
    r.date === selectedDate && r.time === time
    && (!store || r.store === store));
  renderDayList(list);
}

/* ══════════════════════════════
   전체 예약 테이블
══════════════════════════════ */
function renderStatusBar() {
  const bar = document.getElementById('reserveStatusBar');
  if (!bar) return;
  const statuses = ['전체','대기','확정','완료','취소'];
  bar.innerHTML = statuses.map(s => `
    <div class="rs-chip ${(s==='전체'&&!filterStatus)||(s===filterStatus)?'active':''}"
         onclick="setStatusFilter('${s==='전체'?'':s}')">
      ${s}
      <span style="font-weight:400;opacity:0.7;">
        ${s==='전체'
          ? RESERVES.length
          : RESERVES.filter(r=>r.status===s).length}
      </span>
    </div>`).join('');
}

function setStatusFilter(s) {
  filterStatus = s;
  reservePage  = 1;
  renderStatusBar();
  renderReserveTable();
}

function getFilteredReserves() {
  const search = document.getElementById('reserveSearch').value.toLowerCase();
  const store  = document.getElementById('reserveStoreFilter').value;
  return RESERVES.filter(r => {
    if (filterStatus && r.status !== filterStatus) return false;
    if (store && r.store !== store)                 return false;
    if (search
        && !r.customer.includes(search)
        && !r.store.includes(search)
        && !r.service.includes(search)) return false;
    return true;
  }).sort((a,b) =>
    (a.date + a.time) < (b.date + b.time) ? 1 : -1
  );
}

function renderReserveTable() {
  const filtered = getFilteredReserves();
  const pages    = Math.ceil(filtered.length / RESERVE_PAGE) || 1;
  if (reservePage > pages) reservePage = 1;
  const slice    = filtered.slice(
    (reservePage-1)*RESERVE_PAGE,
    reservePage*RESERVE_PAGE
  );

  document.getElementById('reservePageInfo').textContent =
    `총 ${filtered.length}건 중 ${Math.min((reservePage-1)*RESERVE_PAGE+1, filtered.length)}–${Math.min(reservePage*RESERVE_PAGE, filtered.length)}`;

  document.getElementById('reserveTbody').innerHTML = slice.map(r => `
    <tr>
      <td style="font-weight:700;color:var(--admin-accent);cursor:pointer;"
          onclick="openReserveDetail('${r.id}')">${r.id}</td>
      <td>
        <div style="font-weight:600;">${r.customer}</div>
        <div style="font-size:11px;color:var(--text-muted);">${r.phone}</div>
      </td>
      <td>${r.service}</td>
      <td><span class="badge badge-gray">${r.store}</span></td>
      <td style="font-size:12px;">${r.date} ${r.time}</td>
      <td style="font-weight:700;">₩${r.amt.toLocaleString()}</td>
      <td>
        <span class="badge ${R_STATUS_BADGE[r.status]}">${r.status}</span>
      </td>
      <td>
        <button class="btn btn-xs btn-outline"
                onclick="openReserveDetail('${r.id}')">상세</button>
      </td>
    </tr>`).join('');

  /* 페이지 버튼 */
  const pb = document.getElementById('reservePageBtns');
  pb.innerHTML = '';
  for (let i = 1; i <= pages; i++) {
    const btn       = document.createElement('button');
    btn.className   = `btn btn-sm ${i === reservePage ? 'btn-primary' : 'btn-outline'}`;
    btn.textContent = i;
    btn.onclick     = () => { reservePage = i; renderReserveTable(); };
    pb.appendChild(btn);
  }
}

/* ══════════════════════════════
   예약 상세
══════════════════════════════ */
function openReserveDetail(id) {
  const r = RESERVES.find(x => x.id === id);
  if (!r) return;
  editingReserveId = id;
  document.getElementById('reserveDetailTitle').textContent =
    '예약 상세 – ' + id;
  document.getElementById('reserveDetailBody').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:10px;
                font-size:13px;margin-bottom:18px;">
      <div style="display:flex;justify-content:space-between;">
        <span style="color:var(--text-muted);">고객명</span>
        <strong>${r.customer}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;">
        <span style="color:var(--text-muted);">연락처</span>
        <span>${r.phone}</span>
      </div>
      <div style="display:flex;justify-content:space-between;">
        <span style="color:var(--text-muted);">서비스</span>
        <span>${r.service}</span>
      </div>
      <div style="display:flex;justify-content:space-between;">
        <span style="color:var(--text-muted);">매장</span>
        <span>${r.store}</span>
      </div>
      <div style="display:flex;justify-content:space-between;">
        <span style="color:var(--text-muted);">예약일시</span>
        <strong>${r.date} ${r.time}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;">
        <span style="color:var(--text-muted);">금액</span>
        <strong style="color:var(--admin-accent);">₩${r.amt.toLocaleString()}</strong>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">예약 상태</label>
      <select class="form-control" id="rNewStatus">
        ${['대기','확정','완료','취소'].map(s =>
          `<option ${s===r.status?'selected':''}>${s}</option>`
        ).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">메모</label>
      <textarea class="form-control" id="rNewMemo"
                style="min-height:70px;">${r.memo||''}</textarea>
    </div>`;
  document.getElementById('reserveDetailModal').classList.add('open');
}

/* ── 예약 상태 저장 (TTStore 연동) ── */
async function saveReserve() {
  const r = RESERVES.find(x => x.id === editingReserveId);
  if (!r) return;
  r.status = document.getElementById('rNewStatus').value;
  r.memo   = document.getElementById('rNewMemo').value;

  try {
    const res = await AdminAPI.updateReservationStatus(editingReserveId, r.status, r.memo);
    if (!res?.success) throw new Error(res?.message);
    closeModal('reserveDetailModal');
    await loadReserves();
    AdminAPI.toast('예약 상태가 저장되었습니다.', 'success');
  } catch(e) { AdminAPI.toast('저장 실패: ' + e.message, 'error'); }
}

/* ══════════════════════════════
   예약 추가 (TTStore 연동)
══════════════════════════════ */
function openAddReserveModal() {
  document.getElementById('rDate').value = new Date().toISOString().slice(0,10);
  ['rName','rPhone','rAmt','rMemo'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('addReserveModal').classList.add('open');
}

async function addReserve() {
  const name  = document.getElementById('rName').value.trim();
  const phone = document.getElementById('rPhone').value.trim();
  if (!name || !phone) {
    adminToast('고객명과 연락처를 입력하세요.', 'error');
    return;
  }

  /* 새 예약 ID 생성 */
  const newId = 'R-' + String(RESERVES.length + 1).padStart(3,'0');

  const newR = {
    id:       newId,
    customer: name,
    phone,
    service:  document.getElementById('rService').value,
    store:    document.getElementById('rStore').value,
    date:     document.getElementById('rDate').value,
    time:     document.getElementById('rTime').value,
    amt:      parseInt(document.getElementById('rAmt').value) || 0,
    memo:     document.getElementById('rMemo').value,
    status:   '대기',
  };

  try {
    const res = await AdminAPI.post('/reservations', {
      user_id: null, product_id: null, store_id: null,
      customer_name: newR.customer, customer_phone: newR.phone,
      service_type: newR.service, preferred_date: newR.date,
      preferred_time: newR.time, amount: newR.amt, memo: newR.memo,
    });
    if (!res?.success) throw new Error(res?.message);
    closeModal('addReserveModal');
    await loadReserves();
    AdminAPI.toast('예약이 추가되었습니다.', 'success');
  } catch(e) { AdminAPI.toast('추가 실패: ' + e.message, 'error'); }
}

/* ── 공통 ── */
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

['reserveDetailModal','addReserveModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) {
    if (e.target === this) closeModal(id);
  });
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape')
    ['reserveDetailModal','addReserveModal'].forEach(id => closeModal(id));
});

/* ── TTStore 실시간 반영 ── */
window.addEventListener('tt_store_update', e => {
  if (e.detail.key === 'tt_reservations') {
    /* API에서 로드 */
    renderReserveStats();
    renderCalendar();
    renderStatusBar();
    renderReserveTable();
    if (selectedDate) selectDate(selectedDate);
  }
});

/* ── 초기화 ── */
async function loadReserves() {
  try {
    const res = await AdminAPI.getReservations({ limit: 500 });
    if (res?.success) {
      RESERVES = (res.data || []).map(r => ({
        ...r,
        customer: r.customer_name || r.user_name || '고객',
        phone:    r.customer_phone || r.user_phone || '',
        service:  r.service_type || '서비스',
        store:    r.store_name || r.store_id || '미정',
        date:     (r.preferred_date || r.created_at || '').slice(0,10),
        time:     r.preferred_time || '미정',
        amt:      r.amount || 0,
        status:   r.status || '대기',
        memo:     r.memo || '',
      }));
      renderReserveStats();
      renderCalendar();
      renderStatusBar();
      renderReserveTable();
    }
  } catch(e) { console.error('예약 로드 실패', e); }
}

document.addEventListener('DOMContentLoaded', () => {
  loadReserves();
});
</script>
</body>
</html>
