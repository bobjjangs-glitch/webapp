<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>통계 – TIRETOP Admin</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .period-btn {
      padding: 7px 16px; border-radius: 8px; border: 1.5px solid var(--border);
      background: var(--bg-card); cursor: pointer; font-size: 13px;
      font-weight: 600; color: var(--text-muted); transition: all var(--transition);
      font-family: inherit;
    }
    .period-btn.active, .period-btn:hover {
      background: var(--primary); border-color: var(--primary); color: #fff;
    }

    .chart-wrap {
      height: 200px; display: flex; align-items: flex-end;
      gap: 4px; padding: 0 8px;
    }
    .chart-col { display: flex; flex-direction: column; align-items: center; flex: 1; gap: 4px; }
    .chart-bar { width: 100%; border-radius: 6px 6px 0 0; min-height: 4px; transition: height 0.5s cubic-bezier(.4,0,.2,1); cursor: pointer; }
    .chart-bar:hover { filter: brightness(1.1); }
    .chart-lbl { font-size: 10px; color: var(--text-muted); text-align: center; }

    .rank-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0; border-bottom: 1px solid var(--gray-50); font-size: 13px;
    }
    .rank-row:last-child { border-bottom: none; }
    .rank-num {
      width: 24px; height: 24px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800; flex-shrink: 0;
    }
    .rank-num.gold   { background: #fef3c7; color: #92400e; }
    .rank-num.silver { background: #f3f4f6; color: #374151; }
    .rank-num.bronze { background: #fef0e7; color: #92400e; }
    .rank-num.other  { background: var(--surface); color: var(--text-muted); }
    .rank-bar-track { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .rank-bar-fill  { height: 100%; background: var(--admin-accent); border-radius: 3px; }

    .kpi-card-lg {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 22px 24px;
      display: flex; flex-direction: column; gap: 4px; box-shadow: var(--shadow);
    }
    .kpi-card-lg .kpi-label { font-size: 12px; color: var(--text-muted); font-weight: 600; }
    .kpi-card-lg .kpi-val   { font-size: 2rem; font-weight: 900; letter-spacing: -1px; }
    .kpi-card-lg .kpi-sub   { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .kpi-card-lg .kpi-change { font-size: 13px; font-weight: 700; }
    .kpi-change.up   { color: var(--success); }
    .kpi-change.down { color: var(--danger);  }

    .donut-svg { transform: rotate(-90deg); }
    .segment-label { font-size: 11px; fill: var(--text-muted); }

    .table-rank th, .table-rank td {
      padding: 10px 12px; font-size: 13px;
    }
    .table-rank th {
      background: var(--surface); font-weight: 700;
      color: var(--text-muted); border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .table-rank td { border-bottom: 1px solid var(--gray-50); }
    .table-rank tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>

<div id="tt-admin-header"></div>

<div class="admin-main" id="adminMain">
  <div class="admin-content">

    <div class="page-header">
      <div><h2>통계</h2><p>매출·방문자·상품·회원 통계를 한눈에 확인하세요.</p></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;">
        <button class="period-btn active" onclick="setPeriod(this,'week')">7일</button>
        <button class="period-btn" onclick="setPeriod(this,'month')">30일</button>
        <button class="period-btn" onclick="setPeriod(this,'quarter')">90일</button>
        <button class="period-btn" onclick="setPeriod(this,'year')">1년</button>
      </div>
    </div>

    <!-- KPI 카드 -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;" id="kpiGrid"></div>

    <!-- 매출 차트 + 카테고리 -->
    <div class="grid-2" style="margin-bottom:20px;">
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">📈 일별 매출</h3>
          <span id="chartSubtitle" style="font-size:12px;color:var(--text-muted);"></span>
        </div>
        <div class="card-body">
          <div class="chart-wrap" id="salesChart"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><h3 class="card-title">🏷️ 카테고리별 매출 비중</h3></div>
        <div class="card-body">
          <div style="display:flex;gap:20px;align-items:center;flex-wrap:wrap;">
            <svg width="130" height="130" viewBox="0 0 130 130" id="donutSvg"></svg>
            <div id="donutLegend" style="flex:1;min-width:140px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- 방문자 차트 -->
    <div class="card" style="margin-bottom:20px;">
      <div class="card-header">
        <h3 class="card-title">👥 일별 방문자 / 신규 회원</h3>
      </div>
      <div class="card-body">
        <div class="chart-wrap" id="visitorChart"></div>
      </div>
    </div>

    <!-- 상품 랭킹 + 회원 랭킹 + 매장 현황 -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:20px;">
      <div class="card">
        <div class="card-header"><h3 class="card-title">🏆 상품 판매 랭킹</h3></div>
        <div class="card-body" id="productRank"></div>
      </div>
      <div class="card">
        <div class="card-header"><h3 class="card-title">👑 우수 고객 TOP 5</h3></div>
        <div class="card-body" id="customerRank"></div>
      </div>
      <div class="card">
        <div class="card-header"><h3 class="card-title">🏪 매장별 예약</h3></div>
        <div class="card-body" id="storeRank"></div>
      </div>
    </div>

    <!-- 요일별 주문 패턴 + 시간대별 방문 -->
    <div class="grid-2" style="margin-bottom:20px;">
      <div class="card">
        <div class="card-header"><h3 class="card-title">📅 요일별 주문 패턴</h3></div>
        <div class="card-body">
          <div class="chart-wrap" id="dayOfWeekChart"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h3 class="card-title">🕐 시간대별 주문</h3></div>
        <div class="card-body">
          <div class="chart-wrap" id="hourChart"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="tt-admin-footer"></div>

<script src="components/admin-loader.js"></script>
<script>
let curPeriod = 'week';

/* ── 데이터 생성 ── */
function genSalesData(period) {
  const counts = { week:7, month:30, quarter:12, year:12 };
  const base   = { week:850000, month:600000, quarter:4500000, year:15000000 };
  const n = counts[period];
  return Array.from({length:n}, (_,i) => ({
    label: period === 'year' ? `${i+1}월`
         : period === 'quarter' ? `W${i+1}`
         : `${i+1}일`,
    val: Math.round(base[period] * (0.6 + Math.random() * 0.8)),
  }));
}

function genVisitorData(period) {
  const counts = { week:7, month:30, quarter:12, year:12 };
  const n = counts[period];
  return Array.from({length:n}, (_,i) => ({
    label: period === 'year' ? `${i+1}월` : period === 'quarter' ? `W${i+1}` : `${i+1}일`,
    visitors: Math.round(200 + Math.random()*800),
    newUsers: Math.round(20  + Math.random()*80),
  }));
}

const CAT_DATA = [
  { label:'타이어', val:42, color:'#e31e24' },
  { label:'엔진오일', val:23, color:'#6366f1' },
  { label:'배터리', val:18, color:'#f59e0b' },
  { label:'와이퍼', val:11, color:'#10b981' },
  { label:'세차용품', val:6, color:'#3b82f6' },
];

const PRODUCT_RANK = [
  { name:'미쉐린 Primacy 4 225/45R18', emoji:'🛞', sold:88,  revenue:20944000 },
  { name:'피렐리 P-Zero 245/40R19',    emoji:'🛞', sold:64,  revenue:20480000 },
  { name:'금호타이어 XT5 225/55R17',    emoji:'🛞', sold:142, revenue:21016000 },
  { name:'Castrol Edge 5W-30 4L',      emoji:'🛢️', sold:215, revenue:13330000 },
  { name:'보쉬 에어로트윈 650mm',       emoji:'🌧️', sold:188, revenue:6016000  },
];

const CUSTOMER_RANK = [
  { name:'정수호', orders:8, total:2860000 },
  { name:'오민석', orders:6, total:2104000 },
  { name:'김민준', orders:5, total:1960000 },
  { name:'이서연', orders:7, total:1840000 },
  { name:'조현아', orders:4, total:1560000 },
];

const STORE_RANK = [
  { name:'강남점',  rsv:48 },
  { name:'서초점',  rsv:35 },
  { name:'판교점',  rsv:41 },
  { name:'해운대점',rsv:29 },
  { name:'수성점',  rsv:22 },
];

const DAY_DATA = [
  {label:'일',val:42},{label:'월',val:68},{label:'화',val:74},
  {label:'수',val:81},{label:'목',val:77},{label:'금',val:95},{label:'토',val:83},
];

const HOUR_DATA = [
  {label:'9시',val:12},{label:'10시',val:28},{label:'11시',val:35},
  {label:'12시',val:22},{label:'13시',val:18},{label:'14시',val:40},
  {label:'15시',val:45},{label:'16시',val:52},{label:'17시',val:30},
  {label:'18시',val:48},{label:'19시',val:38},{label:'20시',val:25},
  {label:'21시',val:15},{label:'22시',val:8},
];

/* ── KPI ── */
function renderKpi() {
  const sales = genSalesData(curPeriod);
  const total = sales.reduce((s,d) => s+d.val, 0);
  const orders= Math.round(total / 280000);
  const avg   = Math.round(total / orders);
  const grid  = document.getElementById('kpiGrid');
  if (!grid) return;
  const kpis = [
    { label:'총 매출', val:'₩'+total.toLocaleString(), sub:`평균 ₩${avg.toLocaleString()}/건`, change:'+12.4%', up:true, icon:'💰', color:'#fef3c7' },
    { label:'총 주문', val:orders+'건',                sub:'전환율 3.2%',                      change:'+8.1%',  up:true, icon:'📋', color:'#dbeafe' },
    { label:'신규회원', val:Math.round(orders*0.4)+'명',sub:'재방문율 42%',                   change:'+5.3%',  up:true, icon:'👤', color:'#d1fae5' },
    { label:'예약 건수', val:Math.round(orders*0.3)+'건',sub:'완료율 88%',                   change:'-2.1%',  up:false,icon:'📅', color:'#ede9fe' },
  ];
  grid.innerHTML = kpis.map(k => `
    <div class="kpi-card-lg" style="border-top:3px solid var(--admin-accent);">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div class="kpi-label">${k.label}</div>
        <div style="width:38px;height:38px;border-radius:10px;background:${k.color};
                    display:flex;align-items:center;justify-content:center;font-size:18px;">${k.icon}</div>
      </div>
      <div class="kpi-val">${k.val}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div class="kpi-sub">${k.sub}</div>
        <div class="kpi-change ${k.up?'up':'down'}">${k.change}</div>
      </div>
    </div>`).join('');
}

/* ── 바 차트 ── */
function renderBarChart(containerId, data, colorFn, maxVal) {
  const el = document.getElementById(containerId);
  if (!el) return;
  const max = maxVal || Math.max(...data.map(d => d.val||d.visitors||0));
  el.innerHTML = data.map(d => {
    const v   = d.val || d.visitors || 0;
    const pct = max > 0 ? Math.round((v/max)*100) : 0;
    const h   = Math.round((pct/100)*180);
    return `
      <div class="chart-col">
        <div class="chart-bar"
             style="height:${h}px;background:${colorFn(d,pct)};"></div>
        <div class="chart-lbl">${d.label}</div>
      </div>`;
  }).join('');
}

/* ── 매출 차트 ── */
function renderSalesChart() {
  const data = genSalesData(curPeriod);
  const max  = Math.max(...data.map(d=>d.val));
  const sub  = document.getElementById('chartSubtitle');
  if (sub) sub.textContent = `총 ₩${data.reduce((s,d)=>s+d.val,0).toLocaleString()}`;
  renderBarChart('salesChart', data,
    (d,pct) => `linear-gradient(180deg, var(--admin-accent) 0%, #ff6b6b ${100-pct}%)`, max);
}

/* ── 방문자 차트 ── */
function renderVisitorChart() {
  const data = genVisitorData(curPeriod);
  const max  = Math.max(...data.map(d=>d.visitors));
  const el   = document.getElementById('visitorChart');
  if (!el) return;
  el.innerHTML = data.map(d => {
    const pctV = max > 0 ? Math.round((d.visitors/max)*100) : 0;
    const pctN = max > 0 ? Math.round((d.newUsers/max)*100) : 0;
    return `
      <div class="chart-col" style="gap:2px;">
        <div style="display:flex;gap:2px;align-items:flex-end;flex:1;width:100%;">
          <div class="chart-bar" style="flex:1;height:${Math.round(pctV*1.6)}px;background:var(--primary);opacity:0.7;"></div>
          <div class="chart-bar" style="flex:1;height:${Math.round(pctN*1.6)}px;background:var(--success);"></div>
        </div>
        <div class="chart-lbl">${d.label}</div>
      </div>`;
  }).join('');
}

/* ── 도넛 차트 ── */
function renderDonut() {
  const svgEl = document.getElementById('donutSvg');
  const legEl = document.getElementById('donutLegend');
  if (!svgEl || !legEl) return;
  const cx=65, cy=65, r=50, thickness=20;
  const total = CAT_DATA.reduce((s,d)=>s+d.val,0);
  let startAngle = 0;
  let paths = '';
  CAT_DATA.forEach(d => {
    const angle = (d.val / total) * 360;
    const rad1  = startAngle * Math.PI / 180;
    const rad2  = (startAngle+angle) * Math.PI / 180;
    const x1    = cx + r * Math.cos(rad1);
    const y1    = cy + r * Math.sin(rad1);
    const x2    = cx + r * Math.cos(rad2);
    const y2    = cy + r * Math.sin(rad2);
    const large = angle > 180 ? 1 : 0;
    const oi    = r - thickness;
    const ox1   = cx + oi * Math.cos(rad2);
    const oy1   = cy + oi * Math.sin(rad2);
    const ox2   = cx + oi * Math.cos(rad1);
    const oy2   = cy + oi * Math.sin(rad1);
    paths += `<path d="M${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} L${ox1},${oy1} A${oi},${oi} 0 ${large},0 ${ox2},${oy2} Z" fill="${d.color}"/>`;
    startAngle += angle;
  });
  svgEl.innerHTML = paths;
  legEl.innerHTML = CAT_DATA.map(d => `
    <div style="display:flex;align-items:center;justify-content:space-between;
                padding:5px 0;border-bottom:1px solid var(--gray-50);font-size:12px;">
      <div style="display:flex;align-items:center;gap:6px;">
        <div style="width:8px;height:8px;border-radius:50%;background:${d.color};flex-shrink:0;"></div>
        <span>${d.label}</span>
      </div>
      <strong style="color:var(--text);">${d.val}%</strong>
    </div>`).join('');
}

/* ── 상품 랭킹 ── */
function renderProductRank() {
  const el = document.getElementById('productRank');
  if (!el) return;
  const maxSold = Math.max(...PRODUCT_RANK.map(p=>p.sold));
  const rankClasses = ['gold','silver','bronze','other','other'];
  el.innerHTML = PRODUCT_RANK.map((p,i) => `
    <div class="rank-row">
      <div class="rank-num ${rankClasses[i]}">${i+1}</div>
      <div style="font-size:18px;flex-shrink:0;">${p.emoji}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.name}</div>
        <div class="rank-bar-track" style="margin-top:4px;">
          <div class="rank-bar-fill" style="width:${Math.round((p.sold/maxSold)*100)}%;"></div>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:11px;font-weight:700;">${p.sold}개</div>
        <div style="font-size:10px;color:var(--text-muted);">₩${(p.revenue/10000).toFixed(0)}만</div>
      </div>
    </div>`).join('');
}

/* ── 우수 고객 ── */
function renderCustomerRank() {
  const el = document.getElementById('customerRank');
  if (!el) return;
  const maxT = Math.max(...CUSTOMER_RANK.map(c=>c.total));
  const rankClasses = ['gold','silver','bronze','other','other'];
  el.innerHTML = CUSTOMER_RANK.map((c,i) => `
    <div class="rank-row">
      <div class="rank-num ${rankClasses[i]}">${i+1}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;">${c.name}</div>
        <div class="rank-bar-track" style="margin-top:4px;">
          <div class="rank-bar-fill" style="width:${Math.round((c.total/maxT)*100)}%;background:var(--primary);"></div>
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:12px;font-weight:700;color:var(--admin-accent);">₩${(c.total/10000).toFixed(0)}만</div>
        <div style="font-size:10px;color:var(--text-muted);">${c.orders}건</div>
      </div>
    </div>`).join('');
}

/* ── 매장 랭킹 ── */
function renderStoreRank() {
  const el = document.getElementById('storeRank');
  if (!el) return;
  const maxR = Math.max(...STORE_RANK.map(s=>s.rsv));
  el.innerHTML = STORE_RANK.map((s,i) => `
    <div class="rank-row">
      <div class="rank-num ${['gold','silver','bronze','other','other'][i]}">${i+1}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:600;">${s.name}</div>
        <div class="rank-bar-track" style="margin-top:4px;">
          <div class="rank-bar-fill" style="width:${Math.round((s.rsv/maxR)*100)}%;background:var(--success);"></div>
        </div>
      </div>
      <strong style="flex-shrink:0;font-size:13px;">${s.rsv}건</strong>
    </div>`).join('');
}

/* ── 요일별 차트 ── */
function renderDayChart() {
  renderBarChart('dayOfWeekChart', DAY_DATA, () => 'var(--primary)', Math.max(...DAY_DATA.map(d=>d.val)));
}

/* ── 시간대별 차트 ── */
function renderHourChart() {
  renderBarChart('hourChart', HOUR_DATA, (d) => d.val >= 45 ? 'var(--admin-accent)' : 'var(--primary)', Math.max(...HOUR_DATA.map(d=>d.val)));
}

/* ── 기간 변경 ── */
function setPeriod(btn, period) {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  curPeriod = period;
  renderAll();
}

function renderAll() {
  renderKpi();
  renderSalesChart();
  renderVisitorChart();
  renderDonut();
  renderProductRank();
  renderCustomerRank();
  renderStoreRank();
  renderDayChart();
  renderHourChart();
}

document.addEventListener('DOMContentLoaded', renderAll);
</script>
</body>
</html>
